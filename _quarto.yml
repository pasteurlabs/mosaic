project:
  type: website
  output-dir: _site
  pre-render:
    # docs/solvers.qmd is auto-generated from each tesseract_config.yaml's
    # metadata.mosaic block. It's gitignored, so regenerate it on every
    # render/preview to keep navbar links live and the catalog up to date.
    - python docs/generate.py
  render:
    - docs/index.qmd
    - docs/getting-started.qmd
    - docs/standalone.qmd
    - docs/architecture.qmd
    - docs/solvers.qmd
    - docs/tutorial-add-solver.qmd
    - docs/tutorial-add-domain.qmd
    - docs/contributing.qmd
    - docs/results_*.qmd
  resources:
    # Quarto can't resolve `{{< include ../CONTRIBUTING.md >}}` unless the
    # source file is whitelisted as a project resource.
    - CONTRIBUTING.md

website:
  title: Mosaic
  repo-url: https://github.com/pasteurlabs/mosaic
  repo-actions: [edit, issue]
  navbar:
    left:
      - text: Overview
        file: docs/index.qmd
      - text: Getting Started
        file: docs/getting-started.qmd
      - text: Standalone Usage
        file: docs/standalone.qmd
      - text: Architecture
        file: docs/architecture.qmd
      - text: Solver Reference
        file: docs/solvers.qmd
      - text: Contributing
        menu:
          - text: "Contributing guide"
            file: docs/contributing.qmd
          - text: "Add a Solver (Tutorial)"
            file: docs/tutorial-add-solver.qmd
          - text: "Add a Domain (Tutorial)"
            file: docs/tutorial-add-domain.qmd
      - text: Results
        menu:
          - text: "Navier\u2013Stokes (2D)"
            file: docs/results_ns_grid.qmd
          - text: "Navier\u2013Stokes (3D)"
            file: docs/results_ns_3d_grid.qmd
          - text: Structural Mechanics
            file: docs/results_structural_mesh.qmd
          - text: Heat Conduction
            file: docs/results_thermal_mesh.qmd
    right:
      - icon: github
        href: https://github.com/pasteurlabs/mosaic
  page-footer:
    center: "Built with [Quarto](https://quarto.org) · [Mosaic](https://github.com/pasteurlabs/mosaic)"

execute:
  enabled: false

format:
  html:
    theme: flatly
    toc: true
    toc-depth: 3
    code-copy: true
    code-overflow: wrap
    highlight-style: github
