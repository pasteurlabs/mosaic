# The page set (project.render) and the navbar's left side live in the render
# profiles, not here \u2014 Quarto MERGES list values across profiles by
# concatenation, so a profile can't shrink a list defined in the base. To get a
# results-only PR preview we therefore keep those lists out of the base and let
# each profile supply its own:
#   * full (default) \u2192 _quarto-full.yml \u2014 the complete site
#   * pr             \u2192 _quarto-pr.yml   \u2014 results pages only, slim navbar
# Plain `quarto render`/`preview` uses the full profile (profile.default below);
# PR previews set QUARTO_PROFILE=pr in benchmark.yml.
project:
  type: website
  output-dir: _site
  pre-render:
    # docs/solvers.qmd is auto-generated from each tesseract_config.yaml's
    # metadata.mosaic block. It's gitignored, so regenerate it on every
    # render/preview to keep navbar links live and the catalog up to date.
    - python docs/generate.py

profile:
  default: full

website:
  title: Mosaic
  repo-url: https://github.com/pasteurlabs/mosaic
  repo-actions: [edit, issue]
  navbar:
    right:
      - icon: github
        href: https://github.com/pasteurlabs/mosaic
  page-footer:
    center: "Built with [Quarto](https://quarto.org) · [Mosaic](https://github.com/pasteurlabs/mosaic)"

execute:
  enabled: false

format:
  html:
    theme: [flatly, docs/styles.scss]
    toc: true
    toc-depth: 3
    code-copy: true
    code-overflow: wrap
    highlight-style: github
    # Render LaTeX math ($...$ inline, $$...$$ display) with MathJax.
    html-math-method: mathjax
    # Enable click-to-zoom for images tagged {.lightbox} (the result plots).
    lightbox: true
