# The whole site is rendered everywhere \u2014 local `quarto render`/`preview`, PR
# previews (benchmark.yml), and post-merge (publish-results.yml). PRs used to
# render a results-only profile, but that hid prose changes on doc PRs, so the
# split was dropped: there is now a single page set and navbar, defined here.
project:
  type: website
  output-dir: _site
  pre-render:
    # docs/solvers.qmd is auto-generated from each tesseract_config.yaml's
    # metadata.mosaic block. It's gitignored, so regenerate it on every
    # render/preview to keep navbar links live and the catalog up to date.
    - python docs/generate.py
  render:
    - docs/index.qmd
    - docs/getting-started.qmd
    - docs/standalone.qmd
    - docs/internals.qmd
    - docs/solvers.qmd
    - docs/tutorial.qmd
    - docs/results.qmd
    - docs/results_*.qmd

website:
  title: Mosaic
  repo-url: https://github.com/pasteurlabs/mosaic
  repo-actions: [edit, issue]
  navbar:
    # Ordered as a progression: understand -> run -> see results -> look up ->
    # use -> extend. Results is moved to last so it's visible; advanced
    # and contributor topics are grouped under "Contribute" at the end.
    left:
      - text: Overview
        file: docs/index.qmd
      - text: Getting Started
        file: docs/getting-started.qmd
      - text: Solver Reference
        file: docs/solvers.qmd
      - text: Use solvers elsewhere
        file: docs/standalone.qmd
      - text: Contribute
      - text: Results
        file: docs/results.qmd
        menu:
          - text: Add a Backend
            file: docs/tutorial.qmd
          - text: How it works
            file: docs/internals.qmd
    right:
      - icon: github
        href: https://github.com/pasteurlabs/mosaic
  page-footer:
    center: "Built with [Quarto](https://quarto.org) · [Mosaic](https://github.com/pasteurlabs/mosaic)"

execute:
  enabled: false

format:
  html:
    theme: [flatly, docs/styles.scss]
    toc: true
    toc-depth: 3
    code-copy: true
    code-overflow: wrap
    highlight-style: github
    # Render LaTeX math ($...$ inline, $$...$$ display) with MathJax.
    html-math-method: mathjax
    # Enable click-to-zoom for images tagged {.lightbox} (the result plots).
    lightbox: true
    # Click-to-sort for the solver-ranking tables (.sortable-table).
    include-after-body:
      - docs/sortable-tables.html
