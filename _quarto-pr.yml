# PR-preview render profile (activated via QUARTO_PROFILE=pr in benchmark.yml).
#
# On pull requests we only preview the benchmark *results* pages — those are
# the only docs that change run-to-run and that reviewers need to eyeball.
# Rendering the full site (overview, tutorials, solver reference, …) on every
# PR push is wasted work and clutters the preview.
#
# This profile supplies its own render list and navbar so the preview contains
# the results pages only, with a navbar trimmed to Results (no links to pages
# that weren't rendered, which would 404). See the note in _quarto.yml for why
# these lists live in the profiles rather than the base config.
#
# The full site is rendered post-merge in publish-results.yml, which does NOT
# set QUARTO_PROFILE and so uses the default `full` profile.

project:
  render:
    - docs/results_*.qmd

website:
  navbar:
    left:
      - text: Results
        menu:
          - text: "Navier–Stokes (2D)"
            file: docs/results_ns_grid.qmd
          - text: "Navier–Stokes (3D)"
            file: docs/results_ns_3d_grid.qmd
          - text: Structural mechanics
            file: docs/results_structural_mesh.qmd
          - text: Heat transfer
            file: docs/results_thermal_mesh.qmd
