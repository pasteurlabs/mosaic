project:
  type: website
  output-dir: _site
  render:
    - docs/results_*.qmd

website:
  title: "Mosaic (PR Preview)"
  navbar:
    left:
      - text: Results
        menu:
          - text: "Navier\u2013Stokes (2D)"
            file: docs/results_ns_grid.qmd
          - text: "Navier\u2013Stokes (3D)"
            file: docs/results_ns_3d_grid.qmd
          - text: Structural Mechanics
            file: docs/results_structural_mesh.qmd
          - text: Heat Conduction
            file: docs/results_thermal_mesh.qmd
    right:
      - icon: github
        href: https://github.com/pasteurlabs/mosaic
  page-footer:
    center: "PR preview \u2013 results only"

execute:
  enabled: false

format:
  html:
    theme: flatly
    toc: true
    toc-depth: 3
    code-copy: true
    code-overflow: wrap
    highlight-style: github
