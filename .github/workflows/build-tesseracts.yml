name: Build Tesseracts

on:
  workflow_call:
    inputs:
      matrix:
        description: 'JSON array of {"domain", "solver"} objects to build'
        type: string
        required: true
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      domain:
        description: "Domain to build (all, navier-stokes-grid, structural-mesh, thermal-mesh)"
        default: "all"
        type: choice
        options:
          - all
          - navier-stokes-grid
          - structural-mesh
          - thermal-mesh

permissions:
  contents: read
  packages: write

concurrency:
  group: build-tesseracts-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ── Discover solvers (push to main / workflow_dispatch) ──────────────────
  discover:
    name: Discover solvers
    if: github.event_name != 'workflow_call'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6

      - id: detect
        name: Enumerate solvers for domain
        run: |
          set -euo pipefail
          DOMAIN="${{ inputs.domain || 'all' }}"
          MATRIX_JSON="["
          FIRST=true
          for cfg in mosaic/tesseracts/*/tesseract_config.yaml mosaic/tesseracts/*/*/tesseract_config.yaml; do
            [[ -f "$cfg" ]] || continue
            rel="${cfg#mosaic/tesseracts/}"
            rel="${rel%/tesseract_config.yaml}"
            if [[ "$DOMAIN" != "all" && "$rel" != "$DOMAIN/"* ]]; then
              continue
            fi
            D="${rel%%/*}"
            S="${rel#*/}"
            if [[ "$FIRST" == "true" ]]; then FIRST=false; else MATRIX_JSON+=","; fi
            MATRIX_JSON+="{\"domain\":\"${D}\",\"solver\":\"${S}\"}"
          done
          MATRIX_JSON+="]"
          echo "matrix=${MATRIX_JSON}" >> "$GITHUB_OUTPUT"
          echo "Matrix: ${MATRIX_JSON}"

  # ── Build each Tesseract solver ────────────────────────────────────────
  build:
    name: "Build ${{ matrix.domain }}/${{ matrix.solver }}"
    needs: [discover]
    if: always() && !cancelled()
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(inputs.matrix || needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghcrunner \
            /usr/local/share/powershell /usr/share/swift /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h /

      - uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: Install tesseract-core
        run: pip install tesseract-core

      - name: Log in to GHCR
        # Only the main-push path publishes to GHCR (:latest / :<sha>), so only
        # it needs auth. The PR path (workflow_call) never pushes — it exports
        # the built image as an artifact instead — so it needs no login and
        # works from fork PRs whose default token can't write packages.
        if: github.event_name != 'workflow_call'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run build_base.sh (if present)
        run: |
          SOLVER_DIR="mosaic/tesseracts/${{ matrix.domain }}/${{ matrix.solver }}"
          if [[ -f "${SOLVER_DIR}/build_base.sh" ]]; then
            echo "Running ${SOLVER_DIR}/build_base.sh"
            bash "${SOLVER_DIR}/build_base.sh"
          else
            echo "No build_base.sh — skipping"
          fi

      - name: Resolve GHCR image path
        id: image
        run: |
          CONFIG="mosaic/tesseracts/${{ matrix.domain }}/${{ matrix.solver }}/tesseract_config.yaml"
          IMAGE_NAME=$(python3 -c "import yaml; print(yaml.safe_load(open('$CONFIG'))['name'])")
          GHCR_BASE="ghcr.io/${{ github.repository_owner }}/mosaic/${IMAGE_NAME}"
          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "ghcr_base=${GHCR_BASE}" >> "$GITHUB_OUTPUT"

      - name: Build Tesseract image
        # cache-from is best-effort: BuildKit warns and does a full build if the
        # :latest cache ref is missing or unreadable, so this never hard-fails —
        # including on fork PRs (which read the public GHCR cache without login).
        env:
          TESSERACT_DOCKER_BUILD_ARGS: >-
            --cache-from type=registry,ref=${{ steps.image.outputs.ghcr_base }}:latest
            --cache-to type=inline
        run: |
          SOLVER_DIR="mosaic/tesseracts/${{ matrix.domain }}/${{ matrix.solver }}"
          tesseract --loglevel debug build --tag latest "${SOLVER_DIR}"

      # ── main-push path: publish to GHCR ──────────────────────────────
      # Push-to-main (and manual dispatch) publish the baseline images that PR
      # builds later read via `cache-from` and that unchanged solvers are pulled
      # from at their base SHA. PR builds go through workflow_call and take the
      # artifact path below instead — they never push.
      - name: Push to GHCR
        if: github.event_name != 'workflow_call'
        env:
          IMAGE_SHA: ${{ github.sha }}
        run: |
          IMAGE_NAME="${{ steps.image.outputs.image_name }}"
          GHCR_BASE="${{ steps.image.outputs.ghcr_base }}"
          LOCAL_IMAGE="${IMAGE_NAME}:latest"

          # Always tag and push :<sha> (immutable, what PRs pull unchanged
          # solvers by).
          docker tag "${LOCAL_IMAGE}" "${GHCR_BASE}:${IMAGE_SHA}"
          docker push "${GHCR_BASE}:${IMAGE_SHA}"
          echo "Pushed ${GHCR_BASE}:${IMAGE_SHA}"

          # :latest tracks main only (the cache-from ref).
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            docker tag "${LOCAL_IMAGE}" "${GHCR_BASE}:latest"
            docker push "${GHCR_BASE}:latest"
            echo "Pushed ${GHCR_BASE}:latest"
          else
            echo "Skipping :latest tag — only main pushes update :latest"
          fi

      # ── PR path: export the built image as an artifact ───────────────
      # A fork PR's default token can neither push to nor (for a private
      # package) pull from GHCR. So instead of publishing, save the built image
      # to a tarball and hand it to the benchmark run via an artifact. The run
      # `docker load`s it back to `<image_name>:latest` — exactly the local tag
      # `mosaic run --no-build` resolves — so it's interchangeable with a pull.
      # No registry write, works identically for fork and same-repo PRs.
      - name: Save built image as artifact
        if: github.event_name == 'workflow_call'
        run: |
          IMAGE_NAME="${{ steps.image.outputs.image_name }}"
          mkdir -p image-out
          docker save "${IMAGE_NAME}:latest" -o "image-out/${IMAGE_NAME}.tar"
          echo "Saved ${IMAGE_NAME}:latest ($(du -h image-out/${IMAGE_NAME}.tar | cut -f1))"

      - name: Upload solver image artifact
        if: github.event_name == 'workflow_call'
        uses: actions/upload-artifact@v7
        with:
          name: solver-image-${{ steps.image.outputs.image_name }}
          path: image-out/*.tar
          if-no-files-found: error
          # Only consumed by the benchmarks job in the same run; a few days of
          # slack covers a manual re-run of just that job without re-building.
          retention-days: 3
