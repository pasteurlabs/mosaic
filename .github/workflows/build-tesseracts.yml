name: Build Tesseracts

on:
  push:
    branches: [main]
    paths:
      - "mosaic/tesseracts/**"
  pull_request:
    paths:
      - "mosaic/tesseracts/**"
  workflow_dispatch:
    inputs:
      domain:
        description: "Domain to build (all, navier-stokes-grid, structural-mesh, thermal-mesh)"
        default: "all"
        type: choice
        options:
          - all
          - navier-stokes-grid
          - structural-mesh
          - thermal-mesh

permissions:
  contents: read
  packages: write

concurrency:
  group: build-tesseracts-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ── Detect which solvers need building ──────────────────────────────────
  detect-changes:
    name: Detect changed solvers
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      has_solvers: ${{ steps.detect.outputs.has_solvers }}
      needs_dealii_base: ${{ steps.detect.outputs.needs_dealii_base }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed tesseracts
        id: detect
        run: |
          set -euo pipefail

          # Discover all solvers from the filesystem (any dir with tesseract_config.yaml)
          ALL_SOLVERS=()
          for cfg in mosaic/tesseracts/*/tesseract_config.yaml mosaic/tesseracts/*/*/tesseract_config.yaml; do
            [[ -f "$cfg" ]] || continue
            # Strip mosaic/tesseracts/ prefix and /tesseract_config.yaml suffix → domain/solver
            rel="${cfg#mosaic/tesseracts/}"
            rel="${rel%/tesseract_config.yaml}"
            ALL_SOLVERS+=("$rel")
          done

          CHANGED=()

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            DOMAIN="${{ inputs.domain }}"
            for s in "${ALL_SOLVERS[@]}"; do
              if [[ "$DOMAIN" == "all" || "$s" == "$DOMAIN/"* ]]; then
                CHANGED+=("$s")
              fi
            done
          else
            # Push or PR: diff against the base
            if [[ "${{ github.event_name }}" == "pull_request" ]]; then
              BASE_SHA="${{ github.event.pull_request.base.sha }}"
              HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            else
              BASE_SHA="${{ github.event.before }}"
              HEAD_SHA="${{ github.sha }}"
            fi

            if [[ "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
              BASE_SHA="$(git rev-parse HEAD~1 2>/dev/null || echo "")"
            fi

            DIFF_FILES=""
            if [[ -n "$BASE_SHA" ]]; then
              DIFF_FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" 2>/dev/null || echo "")
            fi

            # Match changed files to discovered solver directories
            for s in "${ALL_SOLVERS[@]}"; do
              PREFIX="mosaic/tesseracts/${s}/"
              if echo "$DIFF_FILES" | grep -q "^${PREFIX}"; then
                CHANGED+=("$s")
              fi
            done
          fi

          # Build JSON matrix; detect dealii base need from build_base.sh presence
          NEEDS_DEALII="false"
          MATRIX_JSON="["
          FIRST=true
          for s in "${CHANGED[@]}"; do
            DOMAIN="${s%%/*}"
            SOLVER="${s#*/}"

            if [[ -f "mosaic/tesseracts/${s}/build_base.sh" ]]; then
              NEEDS_DEALII="true"
            fi

            if [[ "$FIRST" == "true" ]]; then
              FIRST=false
            else
              MATRIX_JSON+=","
            fi
            MATRIX_JSON+="{\"domain\":\"${DOMAIN}\",\"solver\":\"${SOLVER}\"}"
          done
          MATRIX_JSON+="]"

          HAS_SOLVERS="false"
          if [[ "${#CHANGED[@]}" -gt 0 ]]; then
            HAS_SOLVERS="true"
          fi

          echo "matrix=${MATRIX_JSON}" >> "$GITHUB_OUTPUT"
          echo "has_solvers=${HAS_SOLVERS}" >> "$GITHUB_OUTPUT"
          echo "needs_dealii_base=${NEEDS_DEALII}" >> "$GITHUB_OUTPUT"

          echo "Changed solvers (${#CHANGED[@]}): ${CHANGED[*]:-none}"
          echo "Needs dealii base: ${NEEDS_DEALII}"
          echo "Matrix: ${MATRIX_JSON}"

  # ── Build dealii-root base image (only if needed) ───────────────────────
  build-base:
    name: Build dealii-root base image
    needs: detect-changes
    if: >-
      needs.detect-changes.outputs.needs_dealii_base == 'true'
      && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build dealii-root base image
        run: bash mosaic/tesseracts/structural-mesh/dealii/build_base.sh

      - name: Tag and push dealii-root to GHCR
        run: |
          GHCR_IMAGE="ghcr.io/${{ github.repository_owner }}/mosaic/dealii-root"
          docker tag dealii-root:latest "${GHCR_IMAGE}:latest"
          docker tag dealii-root:latest "${GHCR_IMAGE}:${{ github.sha }}"
          docker push "${GHCR_IMAGE}:latest"
          docker push "${GHCR_IMAGE}:${{ github.sha }}"

  # ── Build and push each Tesseract solver ────────────────────────────────
  build-and-push:
    name: "Build ${{ matrix.domain }}/${{ matrix.solver }}"
    needs: [detect-changes, build-base]
    if: >-
      always()
      && needs.detect-changes.outputs.has_solvers == 'true'
      && needs.detect-changes.result == 'success'
      && (needs.build-base.result == 'success' || needs.build-base.result == 'skipped')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.detect-changes.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tesseract-core
        run: pip install tesseract-core

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull dealii-root base image from GHCR (if needed)
        if: github.event_name != 'pull_request'
        run: |
          CONFIG="mosaic/tesseracts/${{ matrix.domain }}/${{ matrix.solver }}/tesseract_config.yaml"
          BASE_IMAGE=$(python3 .github/scripts/tesseract-config-field.py "$CONFIG" build_config.base_image)

          if [[ "$BASE_IMAGE" == "dealii-root:latest" ]]; then
            GHCR_IMAGE="ghcr.io/${{ github.repository_owner }}/mosaic/dealii-root:latest"
            echo "Pulling dealii-root base from ${GHCR_IMAGE}"
            docker pull "${GHCR_IMAGE}"
            docker tag "${GHCR_IMAGE}" dealii-root:latest
          else
            echo "Solver does not use dealii-root base image (base_image=${BASE_IMAGE:-default})"
          fi

      - name: Build dealii-root locally (PR only, if needed)
        if: github.event_name == 'pull_request'
        run: |
          CONFIG="mosaic/tesseracts/${{ matrix.domain }}/${{ matrix.solver }}/tesseract_config.yaml"
          BASE_IMAGE=$(python3 .github/scripts/tesseract-config-field.py "$CONFIG" build_config.base_image)

          if [[ "$BASE_IMAGE" == "dealii-root:latest" ]]; then
            echo "Building dealii-root base image locally for PR validation"
            bash mosaic/tesseracts/structural-mesh/dealii/build_base.sh
          fi

      - name: Build Tesseract image
        run: |
          SOLVER_DIR="mosaic/tesseracts/${{ matrix.domain }}/${{ matrix.solver }}"
          tesseract build --tag latest "${SOLVER_DIR}"

      - name: Extract image name and push to GHCR
        if: github.event_name != 'pull_request'
        run: |
          CONFIG="mosaic/tesseracts/${{ matrix.domain }}/${{ matrix.solver }}/tesseract_config.yaml"
          IMAGE_NAME=$(python3 .github/scripts/tesseract-config-field.py "$CONFIG" name)

          echo "Tesseract image name: ${IMAGE_NAME}"

          # The tesseract build produces an image named <name>:latest
          LOCAL_IMAGE="${IMAGE_NAME}:latest"
          GHCR_BASE="ghcr.io/${{ github.repository_owner }}/mosaic/${IMAGE_NAME}"

          # Tag with :latest and :<sha>
          docker tag "${LOCAL_IMAGE}" "${GHCR_BASE}:latest"
          docker tag "${LOCAL_IMAGE}" "${GHCR_BASE}:${{ github.sha }}"

          # Push both tags
          docker push "${GHCR_BASE}:latest"
          docker push "${GHCR_BASE}:${{ github.sha }}"

          echo "Pushed ${GHCR_BASE}:latest"
          echo "Pushed ${GHCR_BASE}:${{ github.sha }}"
