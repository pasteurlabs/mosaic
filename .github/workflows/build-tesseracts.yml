name: Build Tesseracts

on:
  workflow_call:
    inputs:
      matrix:
        description: 'JSON array of {"domain", "solver"} objects to build'
        type: string
        required: true
      ref:
        description: >-
          Commit SHA to check out and build. The trusted benchmark-execute
          workflow passes a PR's validated HEAD so it builds the PR's solver
          code from the base-repo context. Empty → the workflow's own ref.
        type: string
        default: ""
      image_sha:
        description: >-
          SHA to tag the pushed image with. benchmark-execute passes the same
          validated PR HEAD so the tag matches what the benchmark run pulls.
          Empty → the event's PR-head/commit SHA.
        type: string
        default: ""
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      domain:
        description: "Domain to build (all, navier-stokes-grid, structural-mesh, thermal-mesh)"
        default: "all"
        type: choice
        options:
          - all
          - navier-stokes-grid
          - structural-mesh
          - thermal-mesh

permissions:
  contents: read
  packages: write

concurrency:
  group: build-tesseracts-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ── Discover solvers (push to main / workflow_dispatch) ──────────────────
  discover:
    name: Discover solvers
    if: github.event_name != 'workflow_call'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6

      - id: detect
        name: Enumerate solvers for domain
        run: |
          set -euo pipefail
          DOMAIN="${{ inputs.domain || 'all' }}"
          MATRIX_JSON="["
          FIRST=true
          for cfg in mosaic/tesseracts/*/tesseract_config.yaml mosaic/tesseracts/*/*/tesseract_config.yaml; do
            [[ -f "$cfg" ]] || continue
            rel="${cfg#mosaic/tesseracts/}"
            rel="${rel%/tesseract_config.yaml}"
            if [[ "$DOMAIN" != "all" && "$rel" != "$DOMAIN/"* ]]; then
              continue
            fi
            D="${rel%%/*}"
            S="${rel#*/}"
            if [[ "$FIRST" == "true" ]]; then FIRST=false; else MATRIX_JSON+=","; fi
            MATRIX_JSON+="{\"domain\":\"${D}\",\"solver\":\"${S}\"}"
          done
          MATRIX_JSON+="]"
          echo "matrix=${MATRIX_JSON}" >> "$GITHUB_OUTPUT"
          echo "Matrix: ${MATRIX_JSON}"

  # ── Build each Tesseract solver ────────────────────────────────────────
  build:
    name: "Build ${{ matrix.domain }}/${{ matrix.solver }}"
    needs: [discover]
    if: always() && !cancelled()
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(inputs.matrix || needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
        with:
          # When invoked by benchmark-execute (workflow_run), check out the PR's
          # HEAD commit explicitly rather than the default-branch ref this
          # trusted run starts on, so we build the PR's solver code.
          ref: ${{ inputs.ref || github.sha }}

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghcrunner \
            /usr/local/share/powershell /usr/share/swift /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h /

      - uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: Install tesseract-core
        run: pip install tesseract-core

      - name: Log in to GHCR
        # Runs either on push-to-main or from the trusted benchmark-execute
        # (workflow_run) context — both hold a token with package:write, so the
        # push below always succeeds. (Fork `pull_request` runs no longer reach
        # this workflow; they hand off to benchmark-execute instead.)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run build_base.sh (if present)
        run: |
          SOLVER_DIR="mosaic/tesseracts/${{ matrix.domain }}/${{ matrix.solver }}"
          if [[ -f "${SOLVER_DIR}/build_base.sh" ]]; then
            echo "Running ${SOLVER_DIR}/build_base.sh"
            bash "${SOLVER_DIR}/build_base.sh"
          else
            echo "No build_base.sh — skipping"
          fi

      - name: Resolve GHCR image path
        id: image
        run: |
          CONFIG="mosaic/tesseracts/${{ matrix.domain }}/${{ matrix.solver }}/tesseract_config.yaml"
          IMAGE_NAME=$(python3 -c "import yaml; print(yaml.safe_load(open('$CONFIG'))['name'])")
          GHCR_BASE="ghcr.io/${{ github.repository_owner }}/mosaic/${IMAGE_NAME}"
          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "ghcr_base=${GHCR_BASE}" >> "$GITHUB_OUTPUT"

      - name: Build Tesseract image
        env:
          TESSERACT_DOCKER_BUILD_ARGS: >-
            --cache-from type=registry,ref=${{ steps.image.outputs.ghcr_base }}:latest
            --cache-to type=inline
        run: |
          SOLVER_DIR="mosaic/tesseracts/${{ matrix.domain }}/${{ matrix.solver }}"
          tesseract --loglevel debug build --tag latest "${SOLVER_DIR}"

      - name: Push to GHCR
        # Always push :<sha> so the benchmark run can pull the exact image
        # built for this commit. Only push :latest on push-to-main so PR
        # builds don't bump main's latest pointer. No auth-failure tolerance:
        # both callers (push-to-main, trusted benchmark-execute) hold
        # package:write, so a push failure is a real error worth failing on.
        env:
          # benchmark-execute passes the validated PR HEAD via image_sha so the
          # tag matches what the benchmark run pulls; push-to-main falls back to
          # the commit SHA.
          IMAGE_SHA: ${{ inputs.image_sha || github.event.pull_request.head.sha || github.sha }}
        run: |
          IMAGE_NAME="${{ steps.image.outputs.image_name }}"
          GHCR_BASE="${{ steps.image.outputs.ghcr_base }}"
          LOCAL_IMAGE="${IMAGE_NAME}:latest"

          # Always tag and push :<sha>
          docker tag "${LOCAL_IMAGE}" "${GHCR_BASE}:${IMAGE_SHA}"
          docker push "${GHCR_BASE}:${IMAGE_SHA}"
          echo "Pushed ${GHCR_BASE}:${IMAGE_SHA}"

          # :latest tracks main only.
          IS_MAIN_PUSH='${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}'
          if [[ "${IS_MAIN_PUSH}" == "true" ]]; then
            docker tag "${LOCAL_IMAGE}" "${GHCR_BASE}:latest"
            docker push "${GHCR_BASE}:latest"
            echo "Pushed ${GHCR_BASE}:latest"
          else
            echo "Skipping :latest tag — only main pushes update :latest"
          fi
