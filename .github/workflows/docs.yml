name: Generate & Deploy Docs

on:
  push:
    branches: [main, benchmark-results]
  workflow_dispatch: # allows: gh workflow run docs.yml

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Install Python dependencies
        run: cp production.uv.lock uv.lock && uv sync --frozen

      - name: Fetch benchmark results
        run: |
          if git fetch origin benchmark-results 2>/dev/null; then
            # Checkout result plots/JSON into the working tree without switching branches
            git checkout origin/benchmark-results -- latest/ 2>/dev/null || true
            if [ -d latest ]; then
              # Overlay result data into the location generate_results.py expects
              mkdir -p mosaic-results
              for domain_dir in latest/*/; do
                domain=$(basename "$domain_dir")
                # Skip non-domain files (snapshot.json, status-report.md)
                [ -d "$domain_dir" ] || continue
                cp -r "$domain_dir" "mosaic-results/$domain"
              done
              echo "Restored benchmark results from results branch"
              ls -la mosaic-results/
            else
              echo "No results directory on benchmark-results branch"
            fi
          else
            echo "No benchmark-results branch yet — docs will build without result plots"
          fi

      - name: Generate solver reference
        run: uv run python docs/generate.py

      - name: Generate results pages
        run: |
          if [ -d mosaic-results ] && [ "$(ls mosaic-results/)" ]; then
            uv run python docs/generate_results.py
          else
            echo "No benchmark results available — skipping results page generation"
          fi

      - name: Render site
        run: quarto render

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
