name: Docs preview (PR only)

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build docs preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Install Python dependencies
        run: |
          cp production.uv.lock uv.lock
          uv sync --frozen --extra dev

      # ── Fetch benchmark results (best-effort) ──
      # Try the results branch first; this always has the latest baseline.
      # On PRs, a completed benchmark run's artifact takes precedence if available.
      - name: Fetch benchmark results from results branch
        run: |
          if git fetch origin benchmark-results 2>/dev/null; then
            git checkout origin/benchmark-results -- main/ 2>/dev/null || true
            if [ -d main ]; then
              mkdir -p mosaic-results
              for domain_dir in main/*/; do
                domain=$(basename "$domain_dir")
                [ -d "$domain_dir" ] || continue
                cp -r "$domain_dir" "mosaic-results/$domain"
              done
              echo "Restored benchmark results from results branch"
            else
              echo "No results directory on benchmark-results branch"
            fi
          else
            echo "No benchmark-results branch yet — docs will build without result plots"
          fi

      - name: Generate solver reference
        run: uv run python docs/generate.py

      - name: Generate results pages
        run: |
          if [ -d mosaic-results ] && [ "$(ls mosaic-results/)" ]; then
            uv run python docs/generate_results.py
          else
            echo "No benchmark results available — skipping results page generation"
          fi

      - name: Render site
        run: uv run quarto render

      - name: Upload PR preview artifact
        uses: actions/upload-artifact@v7
        with:
          name: docs-preview-pr-${{ github.event.pull_request.number || 'manual' }}
          path: _site/
          retention-days: 14
