name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (pre-commit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"
      - uses: pre-commit/action@v3.0.1

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.14"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: cp production.uv.lock uv.lock && uv sync --frozen --extra dev

      - name: Run tests
        run: uv run pytest

      - name: Validate all problem configs
        run: uv run python .github/scripts/validate-problem-configs.py

  validate-tesseracts:
    name: Validate tesseract configs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: Install dependencies
        run: cp production.uv.lock uv.lock && uv sync --frozen

      - name: Validate all tesseract_config.yaml files
        run: uv run python .github/scripts/validate-tesseract-configs.py

  # ── Merge gate ─────────────────────────────────────────────────────────
  ci-ok:
    name: All checks passed
    if: always()
    needs: [lint, test, validate-tesseracts]
    runs-on: ubuntu-latest
    steps:
      - name: Decide status
        run: |
          # Fail if any dependency was not successful.
          # "result" is one of: success, failure, cancelled, skipped.
          echo "lint: ${{ needs.lint.result }}"
          echo "test: ${{ needs.test.result }}"
          echo "validate-tesseracts: ${{ needs.validate-tesseracts.result }}"

          if [[ "${{ needs.lint.result }}" != "success" \
             || "${{ needs.test.result }}" != "success" \
             || "${{ needs.validate-tesseracts.result }}" != "success" ]]; then
            echo "::error::One or more required checks did not succeed."
            exit 1
          fi
