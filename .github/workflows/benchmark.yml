name: Benchmark

on:
  pull_request:
    types: [opened, synchronize, labeled]
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      problems:
        description: "Comma-separated problems to run (or 'all')"
        default: "all"
      suites:
        description: "Comma-separated suites to run (or 'all')"
        default: "all"

permissions:
  contents: write
  pull-requests: write
  packages: read

concurrency:
  group: benchmark-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  RESULTS_BRANCH: benchmark-results

jobs:
  # ── Determine what to benchmark ──────────────────────────────────────────
  plan:
    name: Plan benchmark run
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.decide.outputs.should_run }}
      problems: ${{ steps.decide.outputs.problems }}
      suites: ${{ steps.decide.outputs.suites }}
      is_main: ${{ steps.decide.outputs.is_main }}
      is_release: ${{ steps.decide.outputs.is_release }}
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Mosaic (for problem registry)
        run: cp production.uv.lock uv.lock && uv sync --frozen

      - id: decide
        name: Decide what to run
        run: |
          IS_MAIN="false"
          IS_RELEASE="false"
          SHOULD_RUN="false"
          PROBLEMS="all"
          SUITES="all"

          # Manual dispatch: always run with provided inputs
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            SHOULD_RUN="true"
            PROBLEMS="${{ github.event.inputs.problems }}"
            SUITES="${{ github.event.inputs.suites }}"
          fi

          # Push to main: run for changed domains
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            IS_MAIN="true"
            SHOULD_RUN="true"

            DIFF_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")

            # Use the problem registry to dynamically map changed files → problems.
            PROBLEMS=$(echo "$DIFF_FILES" | uv run python .github/scripts/detect-changed-problems.py)

            if [[ -z "$PROBLEMS" ]]; then
              # No solver/harness changes — skip benchmark
              SHOULD_RUN="false"
              PROBLEMS="all"
            elif [[ "$PROBLEMS" == "all" ]]; then
              PROBLEMS="all"
            fi
          fi

          # Release tag: run everything
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/v* ]]; then
            IS_RELEASE="true"
            SHOULD_RUN="true"
            PROBLEMS="all"
            SUITES="all"
          fi

          # PR with 'benchmark' label
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            HAS_LABEL=$(echo '${{ toJSON(github.event.pull_request.labels.*.name) }}' | grep -c '"benchmark"' || true)
            if [[ "$HAS_LABEL" -gt 0 ]]; then
              SHOULD_RUN="true"
            fi
          fi

          echo "should_run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"
          echo "problems=$PROBLEMS" >> "$GITHUB_OUTPUT"
          echo "suites=$SUITES" >> "$GITHUB_OUTPUT"
          echo "is_main=$IS_MAIN" >> "$GITHUB_OUTPUT"
          echo "is_release=$IS_RELEASE" >> "$GITHUB_OUTPUT"

          echo "Plan: should_run=$SHOULD_RUN problems=$PROBLEMS suites=$SUITES is_main=$IS_MAIN is_release=$IS_RELEASE"

      - id: matrix
        name: Generate (suite, problem, hardware) matrix
        if: steps.decide.outputs.should_run == 'true'
        run: |
          MATRIX=$(uv run python .github/scripts/generate-benchmark-matrix.py \
            --problems "${{ steps.decide.outputs.problems }}" \
            --suites "${{ steps.decide.outputs.suites }}")
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "Matrix: $MATRIX"

  # ── Build changed solver images → GHCR :<sha> ─────────────────────────
  # Runs on every PR (even without the benchmark label) so that solver
  # builds are verified as part of the merge gate.  When no tesseracts
  # changed, detect-changes inside build-tesseracts finds nothing and
  # the build matrix is empty — cost is one lightweight ubuntu job.
  build:
    name: Build solver images
    uses: ./.github/workflows/build-tesseracts.yml
    permissions:
      contents: read
      packages: write
    secrets: inherit

  # ── Generate initial conditions (lightweight, no Docker) ─────────────────
  ics:
    name: Generate ICs
    needs: plan
    if: needs.plan.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Mosaic
        run: cp production.uv.lock uv.lock && uv sync --frozen

      - name: Run ICs suite
        run: |
          ARGS="--suites ics"
          PROBLEMS="${{ needs.plan.outputs.problems }}"
          SUITES="${{ needs.plan.outputs.suites }}"

          # If plan specified specific suites and ics isn't in the list, skip
          if [[ "$SUITES" != "all" ]]; then
            if ! echo ",$SUITES," | grep -q ",ics,"; then
              echo "Suite ics not in requested suites ($SUITES), skipping"
              exit 0
            fi
          fi

          if [[ "$PROBLEMS" != "all" ]]; then ARGS="$ARGS --problems $PROBLEMS"; fi
          uv run mosaic run $ARGS
        timeout-minutes: 15

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-ics
          path: mosaic-results/
          if-no-files-found: ignore

  # ── Run solver suites (matrix: suite × problem × hardware) ──────────────
  run:
    name: "${{ matrix.suite }} / ${{ matrix.problem }} (${{ matrix.hardware }})"
    needs: [plan, build]
    if: always() && needs.plan.outputs.should_run == 'true' && !cancelled() && needs.plan.result == 'success' && (needs.build.result == 'success' || needs.build.result == 'skipped')
    runs-on: ${{ matrix.hardware == 'gpu' && 'mosaic-bench-gpu' || 'mosaic-bench-cpu' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Mosaic
        run: cp production.uv.lock uv.lock && uv sync --frozen

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull solver images from GHCR
        run: |
          uv run python .github/scripts/pull-solver-images.py \
            --registry "ghcr.io/${{ github.repository_owner }}/mosaic" \
            --problems "${{ matrix.problem }}" \
            --hardware "${{ matrix.hardware }}" \
            --tag "${{ github.sha }}"

      - name: Run ${{ matrix.suite }} / ${{ matrix.problem }} (${{ matrix.hardware }})
        run: |
          uv run mosaic run \
            --suites ${{ matrix.suite }} \
            --problems ${{ matrix.problem }} \
            --hardware ${{ matrix.hardware }} \
            --no-build
        timeout-minutes: ${{ needs.plan.outputs.is_release == 'true' && 180 || 120 }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ matrix.suite }}-${{ matrix.problem }}-${{ matrix.hardware }}
          path: mosaic-results/
          if-no-files-found: ignore

  # ── Merge results, report, publish ─────────────────────────────────────
  report:
    name: Report & publish
    needs: [plan, ics, run]
    if: always() && needs.plan.outputs.should_run == 'true' && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Mosaic
        run: cp production.uv.lock uv.lock && uv sync --frozen

      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          pattern: results-*
          path: mosaic-results/
          merge-multiple: true

      - name: Fetch baseline snapshot from results branch
        id: baseline
        run: |
          BASELINE_PATH=""
          if git fetch origin "$RESULTS_BRANCH" 2>/dev/null; then
            if git show "origin/$RESULTS_BRANCH:latest/snapshot.json" > baseline-snapshot.json 2>/dev/null; then
              BASELINE_PATH="baseline-snapshot.json"
              echo "Fetched baseline snapshot"
            fi
          fi
          echo "path=$BASELINE_PATH" >> "$GITHUB_OUTPUT"

      - name: Generate status snapshot (JSON)
        run: uv run mosaic status --format json > snapshot.json

      - name: Generate status report (markdown)
        run: |
          DIFF_FLAG=""
          if [[ -n "${{ steps.baseline.outputs.path }}" ]]; then
            DIFF_FLAG="--diff-against ${{ steps.baseline.outputs.path }}"
          fi
          uv run mosaic status --format md $DIFF_FLAG > status-report.md

      - name: Upload merged results artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.sha }}
          path: |
            mosaic-results/
            snapshot.json
            status-report.md
          retention-days: 90

      # ── Post PR comment ────────────────────────────────────────────────
      - name: Post status comment on PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          .github/scripts/post-status-comment.sh \
            "${{ github.event.pull_request.number }}" \
            status-report.md

      # ── Attach to GitHub Release (release tags only) ───────────────────
      - name: Attach results to release
        if: needs.plan.outputs.is_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tar czf benchmark-results.tar.gz mosaic-results/ snapshot.json status-report.md
          gh release upload "${{ github.ref_name }}" \
            benchmark-results.tar.gz \
            snapshot.json \
            status-report.md \
            --clobber

      # ── Publish to results branch (main + release) ─────────────────────
      - name: Publish results to results branch
        if: needs.plan.outputs.is_main == 'true' || needs.plan.outputs.is_release == 'true'
        run: |
          set -euo pipefail
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:8}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git fetch origin "$RESULTS_BRANCH" 2>/dev/null; then
            git checkout "$RESULTS_BRANCH"
          else
            git checkout --orphan "$RESULTS_BRANCH"
            git rm -rf . 2>/dev/null || true
            echo "# Mosaic Benchmark Results" > README.md
            echo "" >> README.md
            echo "Automated benchmark results. Do not edit manually." >> README.md
            git add README.md
            git commit -m "Initialize results branch"
          fi

          # Release tags go under releases/<tag>, main pushes under runs/<timestamp>
          if [[ "${{ needs.plan.outputs.is_release }}" == "true" ]]; then
            DEST="releases/${{ github.ref_name }}"
          else
            TIMESTAMP=$(date -u +%Y%m%dT%H%M%SZ)
            DEST="runs/${TIMESTAMP}_${SHORT_SHA}"
          fi

          mkdir -p "$DEST"
          cp snapshot.json "$DEST/"
          cp status-report.md "$DEST/"
          cp -r mosaic-results/* "$DEST/" 2>/dev/null || true

          # Update latest with full results (consumed by docs workflow)
          rm -rf latest
          mkdir -p latest
          cp snapshot.json latest/
          cp status-report.md latest/
          cp -r mosaic-results/* latest/ 2>/dev/null || true

          git add .
          git commit -m "Benchmark results for ${SHORT_SHA}

          Source commit: ${SHA}
          Problems: ${{ needs.plan.outputs.problems }}
          Suites: ${{ needs.plan.outputs.suites }}"

          git push origin "$RESULTS_BRANCH"

  # ── Merge gate ─────────────────────────────────────────────────────────
  bench-ok:
    name: Benchmark checks passed
    if: always()
    needs: [plan, build, ics, run, report]
    runs-on: ubuntu-latest
    steps:
      - name: Decide status
        run: |
          # build must succeed (runs on every PR).
          # ics, run, report may be skipped on unlabeled PRs — that's OK.
          echo "plan: ${{ needs.plan.result }}"
          echo "build: ${{ needs.build.result }}"
          echo "ics: ${{ needs.ics.result }}"
          echo "run: ${{ needs.run.result }}"
          echo "report: ${{ needs.report.result }}"

          if [[ "${{ needs.plan.result }}" != "success" \
             || "${{ needs.build.result }}" != "success" ]]; then
            echo "::error::Required job failed."
            exit 1
          fi

          for result in "${{ needs.ics.result }}" "${{ needs.run.result }}" "${{ needs.report.result }}"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "::error::Benchmark job failed."
              exit 1
            fi
          done
