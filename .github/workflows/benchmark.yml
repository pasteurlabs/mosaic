name: Benchmark

on:
  pull_request:
    types: [opened, synchronize, labeled, unlabeled]
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      problems:
        description: "Comma-separated problems to run (or 'all')"
        default: "all"
      suites:
        description: "Comma-separated suites to run (or 'all')"
        default: "all"

permissions:
  contents: write
  pull-requests: write
  packages: read
  actions: read

concurrency:
  group: benchmark-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  RESULTS_BRANCH: benchmark-results

jobs:
  # ── Determine what to benchmark ──────────────────────────────────────────
  plan:
    name: Plan benchmark run
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.decide.outputs.should_run }}
      mosaic_touched: ${{ steps.decide.outputs.mosaic_touched }}
      label: ${{ steps.decide.outputs.label }}
      solver_matrix: ${{ steps.decide.outputs.solver_matrix }}
      problems: ${{ steps.decide.outputs.problems }}
      suites: ${{ steps.decide.outputs.suites }}
      solvers: ${{ steps.decide.outputs.solvers }}
      is_main: ${{ steps.decide.outputs.is_main }}
      is_release: ${{ steps.decide.outputs.is_release }}
      is_release_pr: ${{ steps.decide.outputs.is_release_pr }}
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Mosaic (for problem registry)
        run: cp production.uv.lock uv.lock && uv sync --frozen

      - id: decide
        name: Decide what to run
        run: |
          IS_MAIN="false"
          IS_RELEASE="false"
          IS_RELEASE_PR="false"
          SHOULD_RUN="false"
          PROBLEMS="all"
          SUITES="all"
          SOLVERS=""
          MOSAIC_TOUCHED="false"
          LABEL=""
          SOLVER_MATRIX="[]"

          # Detect changed files and solvers (all triggers except workflow_dispatch)
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          if [[ -n "${BASE_SHA:-}" && -n "${HEAD_SHA:-}" ]]; then
            if [[ "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
              BASE_SHA="$(git rev-parse HEAD~1 2>/dev/null || echo "")"
            fi
            if [[ -n "$BASE_SHA" ]]; then
              DIFF_FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" 2>/dev/null || echo "")
              SOLVER_MATRIX=$(echo "$DIFF_FILES" | uv run python .github/scripts/detect-changed-solvers.py)
              if echo "$DIFF_FILES" | grep -q '^mosaic/'; then
                MOSAIC_TOUCHED="true"
              fi
            fi
          fi

          # Manual dispatch: always run with provided inputs
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            SHOULD_RUN="true"
            PROBLEMS="${{ github.event.inputs.problems }}"
            SUITES="${{ github.event.inputs.suites }}"
          fi

          # Push to main: run for changed domains
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            IS_MAIN="true"
            SHOULD_RUN="true"

            # Use the problem registry to dynamically map changed files → problems.
            PROBLEMS=$(echo "$DIFF_FILES" | uv run python .github/scripts/detect-changed-problems.py)

            if [[ -z "$PROBLEMS" ]]; then
              SHOULD_RUN="false"
              PROBLEMS="all"
            elif [[ "$PROBLEMS" == "all" ]]; then
              PROBLEMS="all"
            fi
          fi

          # Release tag: results were already computed on the release PR.
          # The report job will fetch them from the results branch and attach
          # them to the GitHub release without re-running benchmarks.
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/v* ]]; then
            IS_RELEASE="true"
            SHOULD_RUN="false"
          fi

          # PR: three-label system (benchmark:none / benchmark:solver / benchmark:all)
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            LABELS='${{ toJSON(github.event.pull_request.labels.*.name) }}'
            HAS_NONE=$(echo "$LABELS" | grep -c '"benchmark:none"' || true)
            HAS_SOLVER=$(echo "$LABELS" | grep -c '"benchmark:solver"' || true)
            HAS_ALL=$(echo "$LABELS" | grep -c '"benchmark:all"' || true)
            LABEL_COUNT=$((HAS_NONE + HAS_SOLVER + HAS_ALL))

            if [[ "$LABEL_COUNT" -gt 1 ]]; then
              echo "::error::Multiple benchmark labels found. Use exactly one of: benchmark:none, benchmark:solver, benchmark:all"
              exit 1
            fi

            if [[ "$HAS_NONE" -gt 0 ]]; then
              LABEL="none"
            elif [[ "$HAS_SOLVER" -gt 0 ]]; then
              LABEL="solver"
            elif [[ "$HAS_ALL" -gt 0 ]]; then
              LABEL="all"
            fi

            case "$LABEL" in
              none)
                SHOULD_RUN="false"
                ;;
              solver)
                # All mosaic/ changes must be under mosaic/tesseracts/
                NON_SOLVER=$(echo "$DIFF_FILES" | grep '^mosaic/' | grep -v '^mosaic/tesseracts/' || true)
                if [[ -n "$NON_SOLVER" ]]; then
                  echo "::error::benchmark:solver requires all mosaic/ changes to be under mosaic/tesseracts/. These files violate that:"
                  echo "$NON_SOLVER"
                  echo "::error::Use benchmark:all instead."
                  exit 1
                fi
                # Must be exactly 0 or 1 solver
                NUM_SOLVERS=$(echo "$SOLVER_MATRIX" | python3 -c "import json,sys; print(len(json.load(sys.stdin)))")
                if [[ "$NUM_SOLVERS" -gt 1 ]]; then
                  echo "::error::benchmark:solver requires changes to exactly one solver, but $NUM_SOLVERS solvers changed. Use benchmark:all instead."
                  exit 1
                fi
                if [[ "$NUM_SOLVERS" -eq 0 ]]; then
                  # No solver actually changed — nothing to do
                  SHOULD_RUN="false"
                else
                  SHOULD_RUN="true"
                  # Scope problems to the affected solver
                  PROBLEMS=$(echo "$DIFF_FILES" | uv run python .github/scripts/detect-changed-problems.py)
                  if [[ -z "$PROBLEMS" ]]; then
                    SHOULD_RUN="false"
                  fi
                  # Extract display name so downstream only pulls/runs this solver
                  SOLVERS=$(echo "$SOLVER_MATRIX" | python3 -c "import json,sys; entries=json.load(sys.stdin); print(','.join(e['display_name'] for e in entries if 'display_name' in e))")
                fi
                ;;
              all)
                SHOULD_RUN="true"
                PROBLEMS="all"
                SUITES="all"
                ;;
              "")
                # No label — gate will block if mosaic/ was touched
                SHOULD_RUN="false"
                ;;
            esac

            # Release PRs: always run full benchmarks (no label needed)
            HEAD_BRANCH="${{ github.event.pull_request.head.ref }}"
            if [[ "$HEAD_BRANCH" == bot/release/* ]]; then
              IS_RELEASE_PR="true"
              SHOULD_RUN="true"
              PROBLEMS="all"
              SUITES="all"
            fi
          fi

          echo "should_run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"
          echo "mosaic_touched=$MOSAIC_TOUCHED" >> "$GITHUB_OUTPUT"
          echo "label=$LABEL" >> "$GITHUB_OUTPUT"
          echo "solver_matrix=$SOLVER_MATRIX" >> "$GITHUB_OUTPUT"
          echo "problems=$PROBLEMS" >> "$GITHUB_OUTPUT"
          echo "suites=$SUITES" >> "$GITHUB_OUTPUT"
          echo "solvers=$SOLVERS" >> "$GITHUB_OUTPUT"
          echo "is_main=$IS_MAIN" >> "$GITHUB_OUTPUT"
          echo "is_release=$IS_RELEASE" >> "$GITHUB_OUTPUT"
          echo "is_release_pr=$IS_RELEASE_PR" >> "$GITHUB_OUTPUT"

          echo "Plan: should_run=$SHOULD_RUN label=$LABEL mosaic_touched=$MOSAIC_TOUCHED problems=$PROBLEMS suites=$SUITES solvers=$SOLVERS is_main=$IS_MAIN is_release=$IS_RELEASE is_release_pr=$IS_RELEASE_PR"

      - id: matrix
        name: Generate (suite, problem, hardware) matrix
        if: steps.decide.outputs.should_run == 'true'
        run: |
          MATRIX=$(uv run python .github/scripts/generate-benchmark-matrix.py \
            --problems "${{ steps.decide.outputs.problems }}" \
            --suites "${{ steps.decide.outputs.suites }}")
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "Matrix: $MATRIX"

  # ── Build changed solver images → GHCR :<sha> ─────────────────────────
  build:
    name: Build solver images
    needs: plan
    if: needs.plan.outputs.should_run == 'true' && needs.plan.outputs.solver_matrix != '[]'
    uses: ./.github/workflows/build-tesseracts.yml
    with:
      matrix: ${{ needs.plan.outputs.solver_matrix }}
    permissions:
      contents: read
      packages: write
    secrets: inherit

  # ── Run benchmarks (ics + solver suites) ───────────────────────────────
  benchmarks:
    name: Run benchmarks
    needs: [plan, build]
    if: always() && needs.plan.outputs.should_run == 'true' && !cancelled() && needs.plan.result == 'success' && (needs.build.result == 'success' || needs.build.result == 'skipped')
    uses: ./.github/workflows/benchmark-run.yml
    with:
      matrix: ${{ needs.plan.outputs.matrix }}
      problems: ${{ needs.plan.outputs.problems }}
      suites: ${{ needs.plan.outputs.suites }}
      solvers: ${{ needs.plan.outputs.solvers }}
      image_tag: ${{ github.event.pull_request.head.sha || github.sha }}
      timeout: 600
    permissions:
      contents: read
      packages: read
    secrets: inherit

  # ── Merge results, report, publish ─────────────────────────────────────
  report:
    name: Report & publish
    needs: [plan, benchmarks]
    if: always() && (needs.plan.outputs.should_run == 'true' || needs.plan.outputs.is_release == 'true') && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Mosaic
        run: cp production.uv.lock uv.lock && uv sync --frozen

      # ── Fetch results (from artifacts or results branch) ─────────────
      - name: Download all results
        if: needs.plan.outputs.should_run == 'true'
        uses: actions/download-artifact@v8
        with:
          pattern: results-*
          path: staging-results/

      - name: Merge results from CPU/GPU artifacts
        if: needs.plan.outputs.should_run == 'true'
        run: uv run python .github/scripts/merge-results.py staging-results/ mosaic-results/

      - name: Fetch pre-computed results from results branch (release tag)
        if: needs.plan.outputs.is_release == 'true' && needs.plan.outputs.should_run != 'true'
        run: |
          set -euo pipefail
          if ! git fetch origin "$RESULTS_BRANCH" 2>/dev/null; then
            echo "::error::No results branch found. Cannot attach results to release."
            exit 1
          fi
          # Fetch from releases/pending (written by the release PR benchmark run)
          mkdir -p mosaic-results
          git checkout "origin/$RESULTS_BRANCH" -- releases/pending/ 2>/dev/null || true
          if [ -d releases/pending ]; then
            cp -r releases/pending/* . 2>/dev/null || true
            echo "Restored pre-computed results from releases/pending"
          else
            # Fall back to latest
            git checkout "origin/$RESULTS_BRANCH" -- latest/ 2>/dev/null || true
            if [ -d latest ]; then
              cp -r latest/* . 2>/dev/null || true
              echo "::warning::No releases/pending found, fell back to latest results"
            else
              echo "::error::No pre-computed results found on results branch."
              exit 1
            fi
          fi

      - name: Fetch baseline snapshot from results branch
        id: baseline
        run: |
          BASELINE_PATH=""
          if git fetch origin "$RESULTS_BRANCH" 2>/dev/null; then
            if git show "origin/$RESULTS_BRANCH:latest/snapshot.json" > baseline-snapshot.json 2>/dev/null; then
              BASELINE_PATH="baseline-snapshot.json"
              echo "Fetched baseline snapshot"
            fi
          fi
          echo "path=$BASELINE_PATH" >> "$GITHUB_OUTPUT"

      - name: Generate status snapshot (JSON)
        run: uv run mosaic status --format json > snapshot.json

      - name: Generate status report (markdown)
        run: |
          DIFF_FLAG=""
          if [[ -n "${{ steps.baseline.outputs.path }}" ]]; then
            DIFF_FLAG="--diff-against ${{ steps.baseline.outputs.path }}"
          fi
          uv run mosaic status --format md $DIFF_FLAG > status-report.md

      - name: Upload merged results artifact
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results-${{ github.sha }}
          path: |
            mosaic-results/
            snapshot.json
            status-report.md
          retention-days: 90

      # ── Post PR comment ────────────────────────────────────────────────
      - name: Post status comment on PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          .github/scripts/post-status-comment.sh \
            "${{ github.event.pull_request.number }}" \
            status-report.md

      # ── Attach to GitHub Release (release tags only) ───────────────────
      - name: Attach results to release
        if: needs.plan.outputs.is_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tar czf benchmark-results.tar.gz mosaic-results/ snapshot.json status-report.md
          gh release upload "${{ github.ref_name }}" \
            benchmark-results.tar.gz \
            snapshot.json \
            status-report.md \
            --clobber

      # ── Publish to results branch (main + release + release PR) ────────
      - name: Publish results to results branch
        if: needs.plan.outputs.is_main == 'true' || needs.plan.outputs.is_release == 'true' || needs.plan.outputs.is_release_pr == 'true'
        run: |
          set -euo pipefail
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:8}"

          git config user.name "PasteurBot"
          git config user.email "${{ vars.PL_PASTEURBOT_EMAIL }}"

          if git fetch origin "$RESULTS_BRANCH" 2>/dev/null; then
            git checkout "$RESULTS_BRANCH"
          else
            git checkout --orphan "$RESULTS_BRANCH"
            git rm -rf . 2>/dev/null || true
            echo "# Mosaic Benchmark Results" > README.md
            echo "" >> README.md
            echo "Automated benchmark results. Do not edit manually." >> README.md
            git add README.md
            git commit -m "Initialize results branch"
          fi

          if [[ "${{ needs.plan.outputs.is_release }}" == "true" ]]; then
            DEST="releases/${{ github.ref_name }}"
          elif [[ "${{ needs.plan.outputs.is_release_pr }}" == "true" ]]; then
            DEST="releases/pending"
          else
            TIMESTAMP=$(date -u +%Y%m%dT%H%M%SZ)
            DEST="runs/${TIMESTAMP}_${SHORT_SHA}"
          fi

          mkdir -p "$DEST"
          cp snapshot.json "$DEST/"
          cp status-report.md "$DEST/"
          cp -r mosaic-results/* "$DEST/" 2>/dev/null || true

          rm -rf latest
          mkdir -p latest
          cp snapshot.json latest/
          cp status-report.md latest/
          cp -r mosaic-results/* latest/ 2>/dev/null || true

          git add .
          git commit -m "Benchmark results for ${SHORT_SHA}

          Source commit: ${SHA}
          Problems: ${{ needs.plan.outputs.problems }}
          Suites: ${{ needs.plan.outputs.suites }}"

          git push origin "$RESULTS_BRANCH"

  # ── Build docs with fresh results ──────────────────────────────────────
  docs:
    name: Build docs
    needs: [plan, report]
    if: always() && needs.report.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Install Python dependencies
        run: cp production.uv.lock uv.lock && uv sync --frozen

      - name: Download benchmark results
        uses: actions/download-artifact@v8
        with:
          name: benchmark-results-${{ github.sha }}
          path: bench-artifact/

      - name: Stage benchmark results
        run: |
          if [ -d bench-artifact/mosaic-results ]; then
            cp -r bench-artifact/mosaic-results .
          fi

      - name: Generate solver reference
        run: uv run python docs/generate.py

      - name: Generate results pages
        run: |
          if [ -d mosaic-results ] && [ "$(ls mosaic-results/)" ]; then
            uv run python docs/generate_results.py
          else
            echo "No benchmark results available — skipping results page generation"
          fi

      - name: Render site
        run: uv run quarto render

      - name: Upload docs artifact
        uses: actions/upload-artifact@v7
        with:
          name: docs-${{ github.event.pull_request.number && format('preview-pr-{0}', github.event.pull_request.number) || github.sha }}
          path: _site/
          retention-days: 14

  # ── Merge gate ─────────────────────────────────────────────────────────
  bench-ok:
    name: Benchmark checks passed
    if: always()
    needs: [plan, build, benchmarks, report, docs]
    runs-on: ubuntu-latest
    steps:
      - name: Decide status
        run: |
          echo "plan: ${{ needs.plan.result }}"
          echo "build: ${{ needs.build.result }}"
          echo "benchmarks: ${{ needs.benchmarks.result }}"
          echo "report: ${{ needs.report.result }}"
          echo "docs: ${{ needs.docs.result }}"
          echo "label: ${{ needs.plan.outputs.label }}"
          echo "mosaic_touched: ${{ needs.plan.outputs.mosaic_touched }}"

          # plan must always succeed
          if [[ "${{ needs.plan.result }}" != "success" ]]; then
            echo "::error::Plan failed."
            exit 1
          fi

          # PR that touches mosaic/ without a benchmark label → block merge
          # (release PRs are exempt — they always run full benchmarks)
          if [[ "${{ github.event_name }}" == "pull_request" \
             && "${{ needs.plan.outputs.mosaic_touched }}" == "true" \
             && "${{ needs.plan.outputs.is_release_pr }}" != "true" \
             && -z "${{ needs.plan.outputs.label }}" ]]; then
            echo "::error::This PR modifies mosaic/ code but has no benchmark label."
            echo "::error::A maintainer must add exactly one of: benchmark:none, benchmark:solver, benchmark:all"
            exit 1
          fi

          # benchmark:none → pass immediately
          if [[ "${{ needs.plan.outputs.label }}" == "none" ]]; then
            echo "benchmark:none — skipping all benchmark checks"
            exit 0
          fi

          # When benchmarks ran, all downstream jobs must succeed (or be skipped)
          if [[ "${{ needs.plan.outputs.should_run }}" == "true" ]]; then
            for result in "${{ needs.build.result }}" "${{ needs.benchmarks.result }}" "${{ needs.report.result }}" "${{ needs.docs.result }}"; do
              if [[ "$result" != "success" && "$result" != "skipped" ]]; then
                echo "::error::Benchmark job failed ($result)."
                exit 1
              fi
            done
          fi
