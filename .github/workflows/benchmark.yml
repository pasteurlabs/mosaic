name: Benchmark

on:
  pull_request:
    types: [opened, synchronize, labeled, unlabeled]
  workflow_dispatch:
    inputs:
      problems:
        description: "Comma-separated problems to run (or 'all')"
        default: "all"
      suites:
        description: "Comma-separated suites to run (or 'all')"
        default: "all"

permissions:
  contents: read
  pull-requests: write
  packages: read
  actions: read

concurrency:
  group: benchmark-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ── Determine what to benchmark ──────────────────────────────────────────
  plan:
    name: Plan benchmark run
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.decide.outputs.should_run }}
      mosaic_touched: ${{ steps.decide.outputs.mosaic_touched }}
      label: ${{ steps.decide.outputs.label }}
      solver_matrix: ${{ steps.decide.outputs.solver_matrix }}
      problems: ${{ steps.decide.outputs.problems }}
      suites: ${{ steps.decide.outputs.suites }}
      solvers: ${{ steps.decide.outputs.solvers }}
      is_release_pr: ${{ steps.decide.outputs.is_release_pr }}
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Mosaic (for problem registry)
        run: cp production.uv.lock uv.lock && uv sync --frozen

      - id: decide
        name: Decide what to run
        run: |
          IS_RELEASE_PR="false"
          SHOULD_RUN="false"
          PROBLEMS="all"
          SUITES="all"
          SOLVERS=""
          MOSAIC_TOUCHED="false"
          LABEL=""
          SOLVER_MATRIX="[]"

          # Detect changed files and solvers
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"

            if [[ -n "$BASE_SHA" && -n "$HEAD_SHA" ]]; then
              DIFF_FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" 2>/dev/null || echo "")
              SOLVER_MATRIX=$(echo "$DIFF_FILES" | uv run python .github/scripts/detect-changed-solvers.py)
              if echo "$DIFF_FILES" | grep -q '^mosaic/'; then
                MOSAIC_TOUCHED="true"
              fi
            fi
          fi

          # Manual dispatch: always run with provided inputs
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            SHOULD_RUN="true"
            PROBLEMS="${{ github.event.inputs.problems }}"
            SUITES="${{ github.event.inputs.suites }}"
          fi

          # PR: three-label system (benchmark:none / benchmark:solver / benchmark:all)
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            LABELS='${{ toJSON(github.event.pull_request.labels.*.name) }}'
            HAS_NONE=$(echo "$LABELS" | grep -c '"benchmark:none"' || true)
            HAS_SOLVER=$(echo "$LABELS" | grep -c '"benchmark:solver"' || true)
            HAS_ALL=$(echo "$LABELS" | grep -c '"benchmark:all"' || true)
            LABEL_COUNT=$((HAS_NONE + HAS_SOLVER + HAS_ALL))

            if [[ "$LABEL_COUNT" -gt 1 ]]; then
              echo "::error::Multiple benchmark labels found. Use exactly one of: benchmark:none, benchmark:solver, benchmark:all"
              exit 1
            fi

            if [[ "$HAS_NONE" -gt 0 ]]; then
              LABEL="none"
            elif [[ "$HAS_SOLVER" -gt 0 ]]; then
              LABEL="solver"
            elif [[ "$HAS_ALL" -gt 0 ]]; then
              LABEL="all"
            fi

            case "$LABEL" in
              none)
                SHOULD_RUN="false"
                ;;
              solver)
                # Run only the solvers whose Tesseract code changed. The set
                # comes from SOLVER_MATRIX (detect-changed-solvers keys off the
                # changed tesseract dirs), so harness/core changes never widen
                # the run — that's what benchmark:all is for. Maintainers apply
                # this label deliberately, so non-solver mosaic/ changes are
                # permitted, and any number of changed solvers is fine.
                NUM_SOLVERS=$(echo "$SOLVER_MATRIX" | python3 -c "import json,sys; print(len(json.load(sys.stdin)))")
                if [[ "$NUM_SOLVERS" -eq 0 ]]; then
                  # No solver Tesseract changed — nothing to do
                  SHOULD_RUN="false"
                else
                  # Per-solver runs work independently (precomputed references)
                  SOLVERS=$(echo "$SOLVER_MATRIX" | python3 -c "import json,sys; print(','.join(e['display_name'] for e in json.load(sys.stdin) if 'display_name' in e))")
                  # Scope problems to those containing the changed solvers.
                  # Derived from the solver set (not the diff), so it stays
                  # narrow even when harness files also changed.
                  PROBLEMS=$(uv run python .github/scripts/filter-problems-by-solver.py --problems all --solvers "$SOLVERS")
                  if [[ -z "$PROBLEMS" ]]; then
                    SHOULD_RUN="false"
                  else
                    SHOULD_RUN="true"
                  fi
                fi
                ;;
              all)
                SHOULD_RUN="true"
                PROBLEMS="all"
                SUITES="all"
                ;;
              "")
                # No label — gate will block if mosaic/ was touched
                SHOULD_RUN="false"
                ;;
            esac

            # Release PRs: always run full benchmarks (no label needed)
            HEAD_BRANCH="${{ github.event.pull_request.head.ref }}"
            if [[ "$HEAD_BRANCH" == bot/release/* ]]; then
              IS_RELEASE_PR="true"
              SHOULD_RUN="true"
              PROBLEMS="all"
              SUITES="all"
            fi
          fi

          echo "should_run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"
          echo "mosaic_touched=$MOSAIC_TOUCHED" >> "$GITHUB_OUTPUT"
          echo "label=$LABEL" >> "$GITHUB_OUTPUT"
          echo "solver_matrix=$SOLVER_MATRIX" >> "$GITHUB_OUTPUT"
          echo "problems=$PROBLEMS" >> "$GITHUB_OUTPUT"
          echo "suites=$SUITES" >> "$GITHUB_OUTPUT"
          echo "solvers=$SOLVERS" >> "$GITHUB_OUTPUT"
          echo "is_release_pr=$IS_RELEASE_PR" >> "$GITHUB_OUTPUT"

          echo "Plan: should_run=$SHOULD_RUN label=$LABEL mosaic_touched=$MOSAIC_TOUCHED problems=$PROBLEMS suites=$SUITES solvers=$SOLVERS is_release_pr=$IS_RELEASE_PR"

      - id: matrix
        name: Generate (suite, problem, hardware) matrix
        if: steps.decide.outputs.should_run == 'true'
        run: |
          SOLVERS="${{ steps.decide.outputs.solvers }}"
          MATRIX=$(uv run python .github/scripts/generate-benchmark-matrix.py \
            --problems "${{ steps.decide.outputs.problems }}" \
            --suites "${{ steps.decide.outputs.suites }}" \
            ${SOLVERS:+--solvers "$SOLVERS"})
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "Matrix: $MATRIX"

  # ── Build changed solver images → image artifacts ─────────────────────
  # On PRs the build exports each changed solver as a `solver-image-*`
  # artifact rather than pushing to GHCR: a fork PR's token can neither push
  # to nor (for a private package) pull from GHCR. The benchmarks job below
  # loads those artifacts. No packages:write needed — the PR path never pushes.
  build:
    name: Build solver images
    needs: plan
    if: needs.plan.outputs.should_run == 'true' && needs.plan.outputs.solver_matrix != '[]'
    uses: ./.github/workflows/build-tesseracts.yml
    with:
      matrix: ${{ needs.plan.outputs.solver_matrix }}
    permissions:
      contents: read
      # Must satisfy build-tesseracts.yml's top-level `packages: write` (a
      # reusable workflow can't be granted less than it declares, or the run
      # fails at startup). The PR path never pushes — the push steps are gated
      # to non-workflow_call — so this scope simply goes unused on PRs.
      packages: write
    secrets: inherit

  # ── Run benchmarks (ics + solver suites) ───────────────────────────────
  benchmarks:
    name: Run benchmarks
    needs: [plan, build]
    if: always() && needs.plan.outputs.should_run == 'true' && !cancelled() && needs.plan.result == 'success' && (needs.build.result == 'success' || needs.build.result == 'skipped')
    uses: ./.github/workflows/benchmark-run.yml
    with:
      matrix: ${{ needs.plan.outputs.matrix }}
      problems: ${{ needs.plan.outputs.problems }}
      suites: ${{ needs.plan.outputs.suites }}
      solvers: ${{ needs.plan.outputs.solvers }}
      # Changed solvers come from the build's image artifacts (loaded in the run
      # job). Unchanged solvers are pulled from GHCR at the PR's base SHA — the
      # main commit this branch sits on, always published by the push-to-main
      # build and immutable, so no stale/racy :latest is ever served. GHCR is
      # public-read, so the pull works from fork PRs without a push.
      base_image_tag: ${{ github.event.pull_request.base.sha || github.sha }}
      timeout: 600
    permissions:
      contents: read
      actions: read # download the solver-image-* artifacts
      packages: read
    secrets: inherit

  # ── Merge results, report, publish ─────────────────────────────────────
  report:
    name: Report & publish
    needs: [plan, benchmarks]
    # Runs on every PR (and every dispatch where benchmarks ran), even for
    # benchmark:none PRs that ran no benchmarks. The benchmark-result steps
    # below are guarded on should_run; the docs render + upload steps run
    # regardless so doc-only PRs still get a Read the Docs preview. A
    # benchmark:none PR still fetches the published baseline, so its preview
    # shows the full site populated with the last released results.
    #
    # This job runs in the PR head's context and uses NO repo secrets, so it
    # works identically for fork PRs. The secret-requiring follow-up (trigger
    # the RTD rebuild, resolve the preview URL, post the PR comment) lives in
    # docs-publish.yml, which fires on workflow_run in the base-repo context.
    if: >-
      always() && !cancelled()
      && needs.plan.result == 'success'
      && (github.event_name == 'pull_request' || needs.plan.outputs.should_run == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Mosaic
        run: cp production.uv.lock uv.lock && uv sync --frozen

      - name: Download all results
        # Only PR runs that actually ran benchmarks produce results-* artifacts.
        # benchmark:none PRs skip this and rely on the baseline below.
        if: needs.plan.outputs.should_run == 'true'
        uses: actions/download-artifact@v8
        with:
          pattern: results-*
          path: staging-results/

      - name: Merge results from CPU/GPU artifacts
        if: needs.plan.outputs.should_run == 'true'
        run: |
          # download-artifact doesn't create the path dir when nothing matches.
          mkdir -p staging-results
          uv run python .github/scripts/merge-results.py staging-results/ mosaic-results/

      - name: Download baseline artifact
        # The baseline artifact is produced by a *different* workflow run
        # (publish-results.yml on main), so actions/download-artifact (which
        # only sees the current run) can't fetch it. fetch-artifact.sh looks up
        # the most recent baseline across the whole repo via the API.
        if: >-
          github.event_name == 'pull_request'
          && needs.plan.outputs.is_release_pr != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          # Exit 2 = baseline not found (non-fatal: first run has no baseline).
          bash .github/scripts/fetch-artifact.sh baseline baseline/mosaic-results/ \
            || [ "$?" -eq 2 ]

      - name: Overlay PR results on baseline
        if: >-
          github.event_name == 'pull_request'
          && needs.plan.outputs.is_release_pr != 'true'
        run: |
          if [ -d baseline/mosaic-results ] && [ "$(ls baseline/mosaic-results/ 2>/dev/null)" ]; then
            if [ -d mosaic-results ] && [ "$(ls mosaic-results/ 2>/dev/null)" ]; then
              # PR ran benchmarks: overlay its (possibly partial) results on the
              # baseline, PR winning per solver.
              MERGED=$(mktemp -d)
              uv run python .github/scripts/overlay-results.py \
                baseline/mosaic-results mosaic-results "$MERGED"
              rm -rf mosaic-results
              mv "$MERGED" mosaic-results
            else
              # benchmark:none (or a PR that ran nothing): no PR results to
              # overlay, so the preview just shows the published baseline.
              rm -rf mosaic-results
              cp -r baseline/mosaic-results mosaic-results
            fi
          fi

      # The status snapshot/report exist only to summarise *this run's* results
      # against the baseline. When no benchmarks ran (e.g. benchmark:none or a
      # docs-only PR), the result tree is just a copy of the baseline, so the
      # report would be an all-zero diff — pure noise. Skip it; the PR comment
      # then carries only the docs-preview link.
      - name: Extract baseline snapshot
        id: baseline
        if: needs.plan.outputs.should_run == 'true'
        run: |
          BASELINE_PATH=""
          if [ -f baseline/mosaic-results/snapshot.json ]; then
            cp baseline/mosaic-results/snapshot.json baseline-snapshot.json
            BASELINE_PATH="baseline-snapshot.json"
            echo "Fetched baseline snapshot"
          fi
          echo "path=$BASELINE_PATH" >> "$GITHUB_OUTPUT"

      - name: Generate status snapshot (JSON)
        if: needs.plan.outputs.should_run == 'true'
        run: uv run mosaic status --format json > snapshot.json

      - name: Generate status report (markdown)
        if: needs.plan.outputs.should_run == 'true'
        run: |
          DIFF_FLAG=""
          if [[ -n "${{ steps.baseline.outputs.path }}" ]]; then
            DIFF_FLAG="--diff-against ${{ steps.baseline.outputs.path }}"
          fi
          uv run mosaic status --format md $DIFF_FLAG > status-report.md

      # ── Render docs site on GHA ────────────────────────────────────────
      # The docs are rendered here (where the full mosaic/jax stack is already
      # installed and memory is ample) rather than on Read the Docs, whose
      # constrained builders OOM-kill the heavy `import mosaic`. RTD only
      # downloads and serves the pre-rendered _site/ (see .readthedocs.yaml).
      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "1.7.31"

      # Regenerate plots for ALL solvers from the merged result.json files.
      # The baseline artifact stores data only (plots are stripped before
      # upload), and only the changed solver re-ran here, so without this step
      # generate_results.py would glob just the changed solver's PNGs and the
      # docs would omit every baseline solver. --plots-only is no-Docker/no-GPU.
      - name: Regenerate plots from merged results
        run: uv run mosaic run --plots-only

      - name: Generate results pages
        run: uv run python docs/generate_results.py

      - name: Render docs site
        # Always render the full site, so doc-only (benchmark:none) PRs preview
        # their prose changes, not just the results pages. Results pages are
        # populated from the merged PR+baseline result tree above.
        run: uv run quarto render --output-dir _site

      # ── Metadata for the downstream publish workflow ───────────────────
      # The RTD trigger, preview-URL lookup, and PR comment all need repo
      # secrets, which GitHub withholds from pull_request runs on fork PRs.
      # So this job (which runs in the *fork's* context) does the secret-free
      # work — render + upload — and hands off to docs-publish.yml, which runs
      # on workflow_run in the *base* repo's context (trusted main code, full
      # secret access). The handoff carries everything that workflow needs but
      # can't otherwise recover: the PR number and whether benchmarks ran.
      - name: Write publish metadata
        if: github.event_name == 'pull_request'
        run: |
          {
            echo "pr_number=${{ github.event.pull_request.number }}"
            echo "should_run=${{ needs.plan.outputs.should_run }}"
          } > publish-meta.txt
          # Ship the status report alongside the site so the downstream comment
          # can include it. Absent (benchmark:none) → downstream posts only the
          # preview banner.
          if [[ "${{ needs.plan.outputs.should_run }}" == "true" ]]; then
            cp status-report.md _site-status-report.md
          fi

      - name: Upload rendered docs site
        uses: actions/upload-artifact@v7
        with:
          # One artifact per PR (RTD serves it keyed off the PR number). For
          # non-PR runs (e.g. workflow_dispatch) fall back to the commit SHA.
          name: docs-site-pr-${{ github.event.pull_request.number || github.sha }}
          path: _site/
          overwrite: true
          retention-days: 90

      - name: Upload publish handoff
        # Consumed by docs-publish.yml (workflow_run). Kept separate from the
        # _site artifact so the downstream can grab just the small metadata +
        # report without unpacking the whole site.
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: docs-publish-meta-${{ github.event.pull_request.number }}
          path: |
            publish-meta.txt
            _site-status-report.md
          if-no-files-found: ignore
          overwrite: true
          retention-days: 7

  # ── Merge gate ─────────────────────────────────────────────────────────
  bench-ok:
    name: Benchmark checks passed
    if: always()
    needs: [plan, build, benchmarks, report]
    runs-on: ubuntu-latest
    steps:
      - name: Decide status
        run: |
          echo "plan: ${{ needs.plan.result }}"
          echo "build: ${{ needs.build.result }}"
          echo "benchmarks: ${{ needs.benchmarks.result }}"
          echo "report: ${{ needs.report.result }}"
          echo "label: ${{ needs.plan.outputs.label }}"
          echo "mosaic_touched: ${{ needs.plan.outputs.mosaic_touched }}"

          # plan must always succeed
          if [[ "${{ needs.plan.result }}" != "success" ]]; then
            echo "::error::Plan failed."
            exit 1
          fi

          # PR that touches mosaic/ without a benchmark label → block merge
          # (release PRs are exempt — they always run full benchmarks)
          if [[ "${{ github.event_name }}" == "pull_request" \
             && "${{ needs.plan.outputs.mosaic_touched }}" == "true" \
             && "${{ needs.plan.outputs.is_release_pr }}" != "true" \
             && -z "${{ needs.plan.outputs.label }}" ]]; then
            echo "::error::This PR modifies mosaic/ code but has no benchmark label."
            echo "::error::A maintainer must add exactly one of: benchmark:none, benchmark:solver, benchmark:all"
            exit 1
          fi

          # benchmark:none → no benchmarks to check, but the report job still
          # runs to render the docs preview. A failed render (e.g. a broken
          # .qmd) should block merge. RTD publishing / PR-commenting happen in
          # docs-publish.yml (workflow_run) and never gate the merge.
          if [[ "${{ needs.plan.outputs.label }}" == "none" ]]; then
            if [[ "${{ github.event_name }}" == "pull_request" \
               && "${{ needs.report.result }}" != "success" \
               && "${{ needs.report.result }}" != "skipped" ]]; then
              echo "::error::Docs preview (report job) failed (${{ needs.report.result }})."
              exit 1
            fi
            echo "benchmark:none — skipping benchmark checks (docs preview OK)"
            exit 0
          fi

          # When benchmarks ran, all downstream jobs must succeed (or be skipped)
          if [[ "${{ needs.plan.outputs.should_run }}" == "true" ]]; then
            for result in "${{ needs.build.result }}" "${{ needs.benchmarks.result }}" "${{ needs.report.result }}"; do
              if [[ "$result" != "success" && "$result" != "skipped" ]]; then
                echo "::error::Benchmark job failed ($result)."
                exit 1
              fi
            done
          fi
