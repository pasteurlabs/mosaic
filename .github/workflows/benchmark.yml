name: Benchmark

on:
  pull_request:
    types: [opened, synchronize, labeled, unlabeled]
  workflow_dispatch:
    inputs:
      problems:
        description: "Comma-separated problems to run (or 'all')"
        default: "all"
      suites:
        description: "Comma-separated suites to run (or 'all')"
        default: "all"

# This workflow runs on `pull_request`, so on fork PRs it gets a read-only
# token and no repo secrets. It therefore does only the secret-free work:
# planning and a metadata handoff. The privileged half — building solver
# images, pushing to (private) GHCR, running benchmarks, rendering docs, and
# commenting — lives in benchmark-execute.yml, which fires on `workflow_run`
# in the trusted base-repo context. See that file's header for the trust model.
#
# `statuses: write` lets the plan-gate job post the `bench-ok` commit status
# (the name branch protection requires) to this PR's head SHA — pending when a
# trusted run will follow, or an immediate success/failure when it won't.
permissions:
  contents: read
  statuses: write
  actions: read

concurrency:
  group: benchmark-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ── Determine what to benchmark ──────────────────────────────────────────
  plan:
    name: Plan benchmark run
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.decide.outputs.should_run }}
      mosaic_touched: ${{ steps.decide.outputs.mosaic_touched }}
      label: ${{ steps.decide.outputs.label }}
      solver_matrix: ${{ steps.decide.outputs.solver_matrix }}
      problems: ${{ steps.decide.outputs.problems }}
      suites: ${{ steps.decide.outputs.suites }}
      solvers: ${{ steps.decide.outputs.solvers }}
      is_release_pr: ${{ steps.decide.outputs.is_release_pr }}
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Mosaic (for problem registry)
        run: cp production.uv.lock uv.lock && uv sync --frozen

      - id: decide
        name: Decide what to run
        run: |
          IS_RELEASE_PR="false"
          SHOULD_RUN="false"
          PROBLEMS="all"
          SUITES="all"
          SOLVERS=""
          MOSAIC_TOUCHED="false"
          LABEL=""
          SOLVER_MATRIX="[]"

          # Detect changed files and solvers
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"

            if [[ -n "$BASE_SHA" && -n "$HEAD_SHA" ]]; then
              DIFF_FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" 2>/dev/null || echo "")
              SOLVER_MATRIX=$(echo "$DIFF_FILES" | uv run python .github/scripts/detect-changed-solvers.py)
              if echo "$DIFF_FILES" | grep -q '^mosaic/'; then
                MOSAIC_TOUCHED="true"
              fi
            fi
          fi

          # Manual dispatch: always run with provided inputs
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            SHOULD_RUN="true"
            PROBLEMS="${{ github.event.inputs.problems }}"
            SUITES="${{ github.event.inputs.suites }}"
          fi

          # PR: three-label system (benchmark:none / benchmark:solver / benchmark:all)
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            LABELS='${{ toJSON(github.event.pull_request.labels.*.name) }}'
            HAS_NONE=$(echo "$LABELS" | grep -c '"benchmark:none"' || true)
            HAS_SOLVER=$(echo "$LABELS" | grep -c '"benchmark:solver"' || true)
            HAS_ALL=$(echo "$LABELS" | grep -c '"benchmark:all"' || true)
            LABEL_COUNT=$((HAS_NONE + HAS_SOLVER + HAS_ALL))

            if [[ "$LABEL_COUNT" -gt 1 ]]; then
              echo "::error::Multiple benchmark labels found. Use exactly one of: benchmark:none, benchmark:solver, benchmark:all"
              exit 1
            fi

            if [[ "$HAS_NONE" -gt 0 ]]; then
              LABEL="none"
            elif [[ "$HAS_SOLVER" -gt 0 ]]; then
              LABEL="solver"
            elif [[ "$HAS_ALL" -gt 0 ]]; then
              LABEL="all"
            fi

            case "$LABEL" in
              none)
                SHOULD_RUN="false"
                ;;
              solver)
                # Run only the solvers whose Tesseract code changed. The set
                # comes from SOLVER_MATRIX (detect-changed-solvers keys off the
                # changed tesseract dirs), so harness/core changes never widen
                # the run — that's what benchmark:all is for. Maintainers apply
                # this label deliberately, so non-solver mosaic/ changes are
                # permitted, and any number of changed solvers is fine.
                NUM_SOLVERS=$(echo "$SOLVER_MATRIX" | python3 -c "import json,sys; print(len(json.load(sys.stdin)))")
                if [[ "$NUM_SOLVERS" -eq 0 ]]; then
                  # No solver Tesseract changed — nothing to do
                  SHOULD_RUN="false"
                else
                  # Per-solver runs work independently (precomputed references)
                  SOLVERS=$(echo "$SOLVER_MATRIX" | python3 -c "import json,sys; print(','.join(e['display_name'] for e in json.load(sys.stdin) if 'display_name' in e))")
                  # Scope problems to those containing the changed solvers.
                  # Derived from the solver set (not the diff), so it stays
                  # narrow even when harness files also changed.
                  PROBLEMS=$(uv run python .github/scripts/filter-problems-by-solver.py --problems all --solvers "$SOLVERS")
                  if [[ -z "$PROBLEMS" ]]; then
                    SHOULD_RUN="false"
                  else
                    SHOULD_RUN="true"
                  fi
                fi
                ;;
              all)
                SHOULD_RUN="true"
                PROBLEMS="all"
                SUITES="all"
                ;;
              "")
                # No label — gate will block if mosaic/ was touched
                SHOULD_RUN="false"
                ;;
            esac

            # Release PRs: always run full benchmarks (no label needed)
            HEAD_BRANCH="${{ github.event.pull_request.head.ref }}"
            if [[ "$HEAD_BRANCH" == bot/release/* ]]; then
              IS_RELEASE_PR="true"
              SHOULD_RUN="true"
              PROBLEMS="all"
              SUITES="all"
            fi
          fi

          echo "should_run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"
          echo "mosaic_touched=$MOSAIC_TOUCHED" >> "$GITHUB_OUTPUT"
          echo "label=$LABEL" >> "$GITHUB_OUTPUT"
          echo "solver_matrix=$SOLVER_MATRIX" >> "$GITHUB_OUTPUT"
          echo "problems=$PROBLEMS" >> "$GITHUB_OUTPUT"
          echo "suites=$SUITES" >> "$GITHUB_OUTPUT"
          echo "solvers=$SOLVERS" >> "$GITHUB_OUTPUT"
          echo "is_release_pr=$IS_RELEASE_PR" >> "$GITHUB_OUTPUT"

          echo "Plan: should_run=$SHOULD_RUN label=$LABEL mosaic_touched=$MOSAIC_TOUCHED problems=$PROBLEMS suites=$SUITES solvers=$SOLVERS is_release_pr=$IS_RELEASE_PR"

      - id: matrix
        name: Generate (suite, problem, hardware) matrix
        if: steps.decide.outputs.should_run == 'true'
        run: |
          SOLVERS="${{ steps.decide.outputs.solvers }}"
          MATRIX=$(uv run python .github/scripts/generate-benchmark-matrix.py \
            --problems "${{ steps.decide.outputs.problems }}" \
            --suites "${{ steps.decide.outputs.suites }}" \
            ${SOLVERS:+--solvers "$SOLVERS"})
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "Matrix: $MATRIX"

          # Guard: should_run=true but an empty include matrix means the plan
          # decided to run yet generated no jobs (e.g. the should_run filter and
          # the matrix generator disagreed). That would yield a green bench-ok
          # with nothing benchmarked — fail loudly instead of passing silently.
          N=$(echo "$MATRIX" | python3 -c "import json,sys; print(len(json.load(sys.stdin).get('include', [])))")
          if [[ "$N" -eq 0 ]]; then
            echo "::error::should_run=true but the benchmark matrix is empty — planning inconsistency."
            exit 1
          fi

  # ── Plan-time merge gate + bench-ok status seeding ─────────────────────
  # Renamed from `bench-ok` (that name is now the *commit status* the trusted
  # benchmark-execute run posts — see below). This job enforces only what is
  # decidable at plan time (the label policy) and seeds the `bench-ok` status:
  #
  #   • policy violation (mosaic/ touched, no label, non-release) → failure
  #   • nothing will run (benchmark:none, no solver change, docs-only) → the
  #     trusted run still renders docs but posts no gate, so seed success here
  #   • a trusted run will run benchmarks → seed pending; benchmark-execute
  #     flips it to success/failure when it finishes
  #
  # Branch protection keeps requiring the `bench-ok` context, so the merge
  # can't go green until either this job short-circuits it or the trusted run
  # reports real results. `github.actor` from a fork can still write a status
  # to its own head SHA with the (read-only-elsewhere) default token.
  plan-gate:
    name: Plan gate
    if: always()
    needs: [plan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Evaluate policy and seed bench-ok status
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          echo "plan: ${{ needs.plan.result }}"
          echo "label: ${{ needs.plan.outputs.label }}"
          echo "mosaic_touched: ${{ needs.plan.outputs.mosaic_touched }}"
          echo "should_run: ${{ needs.plan.outputs.should_run }}"

          # The seed posts are BEST-EFFORT: a fork token that can't write a
          # status must not fail this step (that would flip the run conclusion
          # to failure and gate out the trusted executor, orphaning the gate).
          # The executor's finalize job is the authoritative terminal post for
          # every found=true PR — these seeds only surface state sooner. The
          # policy `exit 1` paths below stay fatal (they intentionally block).
          post() { bash .github/scripts/post-commit-status.sh "$HEAD_SHA" "$1" "$2" "$RUN_URL" || echo "::warning::bench-ok seed ($1) could not be posted; finalize will set it."; }

          # plan must always succeed
          if [[ "${{ needs.plan.result }}" != "success" ]]; then
            post failure "Plan job failed"
            echo "::error::Plan failed."
            exit 1
          fi

          # PR that touches mosaic/ without a benchmark label → block merge
          # (release PRs are exempt — they always run full benchmarks). The
          # planner run then concludes failure, so the executor never runs and
          # this failure status is the final word until a label is applied.
          if [[ "${{ needs.plan.outputs.mosaic_touched }}" == "true" \
             && "${{ needs.plan.outputs.is_release_pr }}" != "true" \
             && -z "${{ needs.plan.outputs.label }}" ]]; then
            post failure "Add a benchmark:{none,solver,all} label"
            echo "::error::This PR modifies mosaic/ code but has no benchmark label."
            echo "::error::A maintainer must add exactly one of: benchmark:none, benchmark:solver, benchmark:all"
            exit 1
          fi

          # Nothing will run (benchmark:none, no solver change, docs-only):
          # seed success now so the check shows green promptly. finalize
          # re-asserts success for this case too, so a failed seed still
          # resolves.
          if [[ "${{ needs.plan.outputs.should_run }}" != "true" ]]; then
            post success "No benchmarks to run for this PR"
            echo "No benchmarks will run — bench-ok seeded success."
            exit 0
          fi

          # Benchmarks will run in the trusted benchmark-execute workflow.
          # Seed pending; finalize flips bench-ok to success/failure.
          post pending "Benchmarks running in benchmark-execute"
          echo "Seeded bench-ok=pending; trusted run will report results."

  # ── Handoff to the trusted benchmark-execute workflow ──────────────────
  # The privileged work (build + push to private GHCR, run benchmarks, render
  # docs, comment) can't happen here on fork PRs. Ship everything the trusted
  # workflow_run needs — but can't recover from its own context — as a small
  # artifact. Every value is a plan output (numeric / enum / SHA / JSON) and is
  # re-validated on the far side before use.
  handoff:
    name: Handoff to benchmark-execute
    needs: [plan]
    if: always() && needs.plan.result == 'success' && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Write handoff metadata
        # All values go through env rather than inline ${{ }} interpolation:
        # PR-controlled strings (labels, and especially any free-form field)
        # must never be spliced into a shell script directly. The executor
        # re-validates each one before use.
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          SHOULD_RUN: ${{ needs.plan.outputs.should_run }}
          LABEL: ${{ needs.plan.outputs.label }}
          IS_RELEASE_PR: ${{ needs.plan.outputs.is_release_pr }}
          PROBLEMS: ${{ needs.plan.outputs.problems }}
          SUITES: ${{ needs.plan.outputs.suites }}
          SOLVERS: ${{ needs.plan.outputs.solvers }}
          SOLVER_MATRIX: ${{ needs.plan.outputs.solver_matrix }}
          RUN_MATRIX: ${{ needs.plan.outputs.matrix }}
        run: |
          {
            echo "pr_number=${PR_NUMBER}"
            echo "head_sha=${HEAD_SHA}"
            echo "base_sha=${BASE_SHA}"
            echo "should_run=${SHOULD_RUN}"
            echo "label=${LABEL}"
            echo "is_release_pr=${IS_RELEASE_PR}"
            echo "problems=${PROBLEMS}"
            echo "suites=${SUITES}"
            echo "solvers=${SOLVERS}"
          } > handoff-meta.txt
          # Matrices are JSON — keep them in their own files to avoid quoting
          # hazards in the key=value metadata.
          printf '%s\n' "$SOLVER_MATRIX" > solver-matrix.json
          printf '%s\n' "$RUN_MATRIX" > run-matrix.json
          echo "--- handoff-meta.txt ---"
          cat handoff-meta.txt

      - name: Upload handoff
        uses: actions/upload-artifact@v7
        with:
          name: bench-handoff-${{ github.event.pull_request.number }}
          path: |
            handoff-meta.txt
            solver-matrix.json
            run-matrix.json
          if-no-files-found: error
          overwrite: true
          retention-days: 7
