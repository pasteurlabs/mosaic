name: Release benchmark

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: read

env:
  RESULTS_BRANCH: benchmark-results

jobs:
  # ── Generate initial conditions (lightweight, no Docker) ─────────────────
  ics:
    name: Generate ICs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Mosaic
        run: cp production.uv.lock uv.lock && uv sync --frozen

      - name: Run ICs suite
        run: uv run mosaic run --suites ics
        timeout-minutes: 15

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-ics
          path: mosaic-results/
          if-no-files-found: ignore

  # ── Run solver suites (matrix: suite × hardware) ────────────────────────
  run:
    name: "${{ matrix.suite }} (${{ matrix.hardware }})"
    runs-on: ${{ matrix.hardware == 'gpu' && 'mosaic-bench-gpu' || 'mosaic-bench-cpu' }}
    strategy:
      fail-fast: false
      matrix:
        suite: [forward, cost, gradient, optimization]
        hardware: [gpu, cpu]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Mosaic
        run: cp production.uv.lock uv.lock && uv sync --frozen

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull pre-built solver images from GHCR
        run: |
          uv run python .github/scripts/pull-solver-images.py \
            --registry "ghcr.io/${{ github.repository_owner }}/mosaic" \
            --problems all \
            --hardware "${{ matrix.hardware }}"

      - name: Run ${{ matrix.suite }} (${{ matrix.hardware }})
        run: |
          uv run mosaic run --suites ${{ matrix.suite }} --hardware ${{ matrix.hardware }} --no-build
        timeout-minutes: 180

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ matrix.suite }}-${{ matrix.hardware }}
          path: mosaic-results/
          if-no-files-found: ignore

  # ── Merge results, report, publish release ───────────────────────────────
  report:
    name: Report & publish release
    needs: [ics, run]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Mosaic
        run: cp production.uv.lock uv.lock && uv sync --frozen

      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          pattern: results-*
          path: mosaic-results/
          merge-multiple: true

      - name: Fetch baseline snapshot
        id: baseline
        run: |
          BASELINE_PATH=""
          if git fetch origin "$RESULTS_BRANCH" 2>/dev/null; then
            if git show "origin/$RESULTS_BRANCH:latest/snapshot.json" > baseline-snapshot.json 2>/dev/null; then
              BASELINE_PATH="baseline-snapshot.json"
            fi
          fi
          echo "path=$BASELINE_PATH" >> "$GITHUB_OUTPUT"

      - name: Generate snapshots
        run: |
          uv run mosaic status --format json > snapshot.json
          DIFF_FLAG=""
          if [[ -n "${{ steps.baseline.outputs.path }}" ]]; then
            DIFF_FLAG="--diff-against ${{ steps.baseline.outputs.path }}"
          fi
          uv run mosaic status --format md $DIFF_FLAG > status-report.md

      - name: Package results
        run: tar czf benchmark-results.tar.gz mosaic-results/ snapshot.json status-report.md

      - name: Attach results to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            benchmark-results.tar.gz \
            snapshot.json \
            status-report.md \
            --clobber

      - name: Publish to results branch
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          SHA="${{ github.sha }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git fetch origin "$RESULTS_BRANCH" 2>/dev/null; then
            git checkout "$RESULTS_BRANCH"
          else
            git checkout --orphan "$RESULTS_BRANCH"
            git rm -rf . 2>/dev/null || true
            echo "# Mosaic Benchmark Results" > README.md
            echo "" >> README.md
            echo "Automated benchmark results. Do not edit manually." >> README.md
            git add README.md
            git commit -m "Initialize results branch"
          fi

          DEST="releases/${TAG}"
          mkdir -p "$DEST"
          cp snapshot.json "$DEST/"
          cp status-report.md "$DEST/"
          cp -r mosaic-results/* "$DEST/" 2>/dev/null || true

          # Update latest with full results (consumed by docs workflow)
          rm -rf latest
          mkdir -p latest
          cp snapshot.json latest/
          cp status-report.md latest/
          cp -r mosaic-results/* latest/ 2>/dev/null || true

          git add .
          git commit -m "Release benchmark results for ${TAG}

          Source commit: ${SHA}"

          git push origin "$RESULTS_BRANCH"
