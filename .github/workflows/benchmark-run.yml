name: Run benchmarks

on:
  workflow_call:
    inputs:
      matrix:
        description: 'JSON object with "include" key for (suite, problem, hardware) matrix'
        type: string
        required: true
      problems:
        description: "Comma-separated problems (or 'all') — used for IC generation"
        type: string
        default: "all"
      suites:
        description: "Comma-separated suites (or 'all') — used for IC suite filter"
        type: string
        default: "all"
      base_image_tag:
        description: >-
          GHCR tag (the base/main commit SHA) to pull the unchanged solvers at.
          Always an immutable, already-built SHA — never :latest. Changed
          solvers are loaded from build artifacts, not pulled.
        type: string
        default: ""
      solvers:
        description: "Comma-separated solver display names to restrict the run to (or '' for all)"
        type: string
        default: ""
      timeout:
        description: "Per-job timeout in minutes"
        type: number
        default: 120

permissions:
  contents: read
  packages: read

jobs:
  # ── Generate initial conditions (lightweight, no Docker) ─────────────────
  ics:
    name: Generate ICs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Mosaic
        run: cp production.uv.lock uv.lock && uv sync --frozen

      - name: Run ICs suite
        run: |
          ARGS="--suites ics"
          PROBLEMS="${{ inputs.problems }}"
          SUITES="${{ inputs.suites }}"

          if [[ "$SUITES" != "all" ]]; then
            if ! echo ",$SUITES," | grep -q ",ics,"; then
              echo "Suite ics not in requested suites ($SUITES), skipping"
              exit 0
            fi
          fi

          if [[ "$PROBLEMS" != "all" ]]; then ARGS="$ARGS --problems $PROBLEMS"; fi
          uv run mosaic run $ARGS
        timeout-minutes: 15

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: results-ics
          path: mosaic-results/
          if-no-files-found: ignore

  # ── Run solver suites (matrix: suite × problem × hardware) ──────────────
  run:
    name: "${{ matrix.suite }} | ${{ matrix.problem }} | ${{ matrix.hardware }}"
    runs-on: ${{ matrix.hardware == 'gpu' && 'mosaic-bench-gpu' || 'mosaic-bench-cpu' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(inputs.matrix) }}
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Mosaic
        run: cp production.uv.lock uv.lock && uv sync --frozen

      # ── Load PR-built solver images from artifacts ────────────────────
      # The build job exported each changed solver's image as a `solver-image-*`
      # artifact (a fork PR can't push to GHCR). Load them back to
      # `<image_name>:latest` — the local tag `mosaic run --no-build` resolves —
      # so they're interchangeable with a registry pull. Absent on runs that
      # built nothing (e.g. benchmark:all pulling everything from base SHA).
      - name: Download PR-built solver images
        id: dl_images
        continue-on-error: true # no artifacts on runs that rebuilt nothing
        uses: actions/download-artifact@v8
        with:
          pattern: solver-image-*
          path: solver-images/
          merge-multiple: true

      - name: Load solver images and list them
        id: loaded
        run: |
          LOADED=""
          shopt -s nullglob
          for tar in solver-images/*.tar; do
            echo "Loading $tar"
            docker load -i "$tar"
            NAME="$(basename "$tar" .tar)"
            LOADED="${LOADED:+$LOADED,}${NAME}"
          done
          echo "loaded_images=$LOADED" >> "$GITHUB_OUTPUT"
          echo "Loaded images: ${LOADED:-<none>}"

      # ── Pull the remaining (unchanged) solvers from GHCR ──────────────
      # Unchanged solvers are pulled at the base/main SHA (immutable, always
      # published by the push-to-main build). The GHCR packages are public, so
      # no login is required — this works from fork PRs. Login is best-effort to
      # raise rate limits when a token happens to be available.
      - name: Log in to GHCR (best-effort)
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull solver images from GHCR
        run: |
          SOLVERS="${{ inputs.solvers }}"
          BASE_TAG="${{ inputs.base_image_tag }}"
          LOADED="${{ steps.loaded.outputs.loaded_images }}"
          # No --tag: the PR-head SHA is never published (images come from
          # artifacts). Everything not loaded locally is pulled at the base SHA.
          uv run python .github/scripts/pull-solver-images.py \
            --registry "ghcr.io/${{ github.repository_owner }}/mosaic" \
            --problems "${{ matrix.problem }}" \
            --hardware "${{ matrix.hardware }}" \
            ${BASE_TAG:+--fallback-tag "$BASE_TAG"} \
            ${SOLVERS:+--solvers "$SOLVERS"} \
            ${LOADED:+--skip-images "$LOADED"}

      - name: Run ${{ matrix.suite }} | ${{ matrix.problem }} | ${{ matrix.hardware }}
        run: |
          SOLVERS="${{ inputs.solvers }}"
          uv run mosaic run \
            --suites ${{ matrix.suite }} \
            --problems ${{ matrix.problem }} \
            --hardware ${{ matrix.hardware }} \
            --no-build \
            ${SOLVERS:+--solvers "$SOLVERS"}
        timeout-minutes: ${{ inputs.timeout }}

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: results-${{ matrix.suite }}-${{ matrix.problem }}-${{ matrix.hardware }}
          path: mosaic-results/
          if-no-files-found: ignore
