name: Publish benchmark results

# Runs on every push to main (i.e. after a PR is merged).  Finds the
# Benchmark workflow run that produced results for the merged PR,
# merges them with the current baseline artifact, and uploads the
# result as the new baseline.
#
# Dev PRs:     overlay onto baseline
# Release PRs: overlay + attach release-<version>.zip to the GitHub release

on:
  push:
    branches: [main]

permissions:
  contents: write
  actions: read
  pull-requests: read

jobs:
  publish:
    name: Publish to baseline artifact
    runs-on: ubuntu-latest
    steps:
      - name: Find benchmark run for this merge
        id: find
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find the PR that produced this merge commit
          PR_NUM=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
            --jq '.[0].number // empty' 2>&1 || true)

          # Validate it's actually a number (gh may print error messages)
          if ! [[ "$PR_NUM" =~ ^[0-9]+$ ]]; then
            echo "No PR found for this push — skipping"
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Detect release PRs by head branch name
          HEAD_BRANCH=$(gh api "repos/${{ github.repository }}/pulls/${PR_NUM}" --jq '.head.ref')
          HEAD_SHA=$(gh api "repos/${{ github.repository }}/pulls/${PR_NUM}" --jq '.head.sha')

          IS_RELEASE="false"
          VERSION=""
          if [[ "$HEAD_BRANCH" == bot/release/* ]]; then
            IS_RELEASE="true"
            VERSION="${HEAD_BRANCH#bot/release/}"
          fi

          # Find the Benchmark workflow run for this PR's head SHA
          RUN_ID=$(gh api "repos/${{ github.repository }}/actions/workflows/benchmark.yml/runs?head_sha=${HEAD_SHA}&status=completed&event=pull_request" \
            --jq '.workflow_runs | map(select(.conclusion == "success")) | sort_by(.updated_at) | last | .id' 2>/dev/null || true)

          if [[ -z "$RUN_ID" || "$RUN_ID" == "null" ]]; then
            echo "No successful Benchmark run found for PR #${PR_NUM} (SHA ${HEAD_SHA}) — skipping"
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "PR #${PR_NUM} (release=$IS_RELEASE version=$VERSION) — benchmark run $RUN_ID"
          echo "should_publish=true" >> "$GITHUB_OUTPUT"
          echo "pr_number=$PR_NUM" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "is_release=$IS_RELEASE" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        if: steps.find.outputs.should_publish == 'true'

      - uses: astral-sh/setup-uv@v7
        if: steps.find.outputs.should_publish == 'true'
        with:
          enable-cache: true

      - name: Install Mosaic
        if: steps.find.outputs.should_publish == 'true'
        run: cp production.uv.lock uv.lock && uv sync --frozen

      - name: Download benchmark artifacts
        if: steps.find.outputs.should_publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID="${{ steps.find.outputs.run_id }}"
          echo "Downloading artifacts from workflow run $RUN_ID"

          ARTIFACTS=$(gh api "repos/${{ github.repository }}/actions/runs/${RUN_ID}/artifacts" \
            --jq '.artifacts[] | select(.name | startswith("results-")) | .id')

          if [[ -z "$ARTIFACTS" ]]; then
            echo "::error::No results-* artifacts found in run $RUN_ID"
            exit 1
          fi

          mkdir -p staging-results
          for AID in $ARTIFACTS; do
            echo "  downloading artifact $AID"
            gh api "repos/${{ github.repository }}/actions/artifacts/${AID}/zip" > "/tmp/art-${AID}.zip"
            ADIR="staging-results/results-${AID}"
            mkdir -p "$ADIR"
            unzip -q -o "/tmp/art-${AID}.zip" -d "$ADIR"
            rm "/tmp/art-${AID}.zip"
          done

          echo "Downloaded $(echo "$ARTIFACTS" | wc -l | tr -d ' ') artifact(s)"

      - name: Merge results from CPU/GPU artifacts
        if: steps.find.outputs.should_publish == 'true'
        run: uv run python .github/scripts/merge-results.py staging-results/ mosaic-results/

      - name: Download current baseline artifact
        # The baseline artifact lives in a previous publish-results run, not
        # this one, so actions/download-artifact (current-run only) can't see
        # it. A silent miss here would clobber the accumulated baseline with
        # only this PR's solver. fetch-artifact.sh resolves it via the API.
        if: steps.find.outputs.should_publish == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          # Exit 2 = baseline not found (non-fatal: first run has no baseline).
          bash .github/scripts/fetch-artifact.sh baseline baseline/mosaic-results/ \
            || [ "$?" -eq 2 ]

      - name: Overlay onto baseline
        if: steps.find.outputs.should_publish == 'true'
        run: |
          if [ -d baseline/mosaic-results ] && [ "$(ls baseline/mosaic-results/ 2>/dev/null)" ]; then
            echo "Overlaying PR results onto baseline"
            uv run python .github/scripts/overlay-results.py \
              baseline/mosaic-results mosaic-results merged-results
            rm -rf mosaic-results
            mv merged-results mosaic-results
          else
            echo "No baseline artifact found — using PR results as initial baseline"
          fi

      - name: Generate snapshot and status report
        if: steps.find.outputs.should_publish == 'true'
        run: |
          uv run mosaic status --format json > mosaic-results/snapshot.json
          uv run mosaic status --format md > mosaic-results/status-report.md

      # ── Render docs site on GHA ────────────────────────────────────────
      # Render here (full stack + memory available) and publish the rendered
      # _site/ as an artifact that RTD downloads and serves. Must run BEFORE
      # the strip step below, which removes the plots from mosaic-results/.
      - name: Set up Quarto
        if: steps.find.outputs.should_publish == 'true'
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "1.7.31"

      - name: Render docs site
        # Regenerate plots for ALL solvers from the merged result.json files
        # first: the baseline artifact stores data only (plots stripped on
        # upload) and only the merged PR's solver re-ran, so without this the
        # rendered docs would omit every baseline solver's plots.
        # --plots-only is no-Docker/no-GPU.
        if: steps.find.outputs.should_publish == 'true'
        run: |
          uv run mosaic run --plots-only
          uv run python docs/generate_results.py
          uv run quarto render --output-dir _site

      # latest is uploaded for every publish (a release also rebuilds latest
      # on RTD — see the "Trigger RTD build (release)" step below).
      - name: Upload docs site (latest)
        if: steps.find.outputs.should_publish == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: docs-site-latest
          path: _site/
          overwrite: true
          retention-days: 400

      - name: Upload docs site (release)
        if: >-
          steps.find.outputs.should_publish == 'true'
          && steps.find.outputs.is_release == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: docs-site-release-${{ steps.find.outputs.version }}
          path: _site/
          retention-days: 400

      - name: Strip derived files from baseline
        if: steps.find.outputs.should_publish == 'true'
        run: |
          # Remove derived files that are regenerated at docs-build time
          find mosaic-results/ -name "*.png" -delete 2>/dev/null || true
          find mosaic-results/ -name "*.gif" -delete 2>/dev/null || true
          find mosaic-results/ -name "result_partial.json" -delete 2>/dev/null || true
          find mosaic-results/ -name "*.lock" -delete 2>/dev/null || true
          find mosaic-results/ -name "result.csv" -delete 2>/dev/null || true
          echo "Stripped derived files from baseline"

      - name: Upload baseline artifact
        if: steps.find.outputs.should_publish == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: baseline
          path: mosaic-results/
          overwrite: true
          retention-days: 400

      - name: Attach release results to GitHub release
        # The release tag is created by release.yml, which runs concurrently
        # off the same merge. Poll until the release exists, then attach the
        # results as a release asset (replacing the old workflow artifact).
        if: >-
          steps.find.outputs.should_publish == 'true'
          && steps.find.outputs.is_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.find.outputs.version }}"
          ASSET="release-${VERSION}.zip"

          (cd mosaic-results && zip -q -r "/tmp/${ASSET}" .)

          # Wait for release.yml to create the release tag (runs concurrently).
          for attempt in $(seq 1 30); do
            if gh release view "$VERSION" >/dev/null 2>&1; then
              echo "Release $VERSION found"
              break
            fi
            if [[ "$attempt" -eq 30 ]]; then
              echo "::error::Release $VERSION not found after waiting ~5min"
              exit 1
            fi
            echo "Release $VERSION not ready yet (attempt $attempt/30) — waiting 10s"
            sleep 10
          done

          gh release upload "$VERSION" "/tmp/${ASSET}" --clobber
          echo "Attached ${ASSET} to release $VERSION"

      # ── Trigger Read the Docs build ──────────────────────────────────
      # The baseline artifact is now uploaded; trigger RTD so it can
      # fetch the artifact and rebuild the docs site.
      - name: Trigger RTD build (latest)
        if: >-
          steps.find.outputs.should_publish == 'true'
          && steps.find.outputs.is_release != 'true'
        env:
          RTD_TOKEN: ${{ secrets.RTD_TOKEN }}
          RTD_PROJECT: ${{ vars.RTD_PROJECT }}
        run: bash .github/scripts/rtd-trigger.sh latest

      - name: Trigger RTD build (release)
        if: >-
          steps.find.outputs.should_publish == 'true'
          && steps.find.outputs.is_release == 'true'
        env:
          RTD_TOKEN: ${{ secrets.RTD_TOKEN }}
          RTD_PROJECT: ${{ vars.RTD_PROJECT }}
        run: |
          # Build both the release version and latest
          bash .github/scripts/rtd-trigger.sh "stable"
          bash .github/scripts/rtd-trigger.sh "latest"
