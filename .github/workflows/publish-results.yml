name: Publish benchmark results

# Runs on every push to main (i.e. after a PR is merged).  Finds the
# Benchmark workflow run that produced results for the merged PR and
# publishes them to the benchmark-results branch with solver-level merging.
#
# Dev PRs:     overlay onto main/
# Release PRs: write to {version}/ and reset main/ to the release baseline

on:
  push:
    branches: [main]

permissions:
  contents: write
  actions: read

env:
  RESULTS_BRANCH: benchmark-results

jobs:
  publish:
    name: Publish to results branch
    runs-on: ubuntu-latest
    steps:
      - name: Find benchmark run for this merge
        id: find
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find the PR that produced this merge commit
          PR_NUM=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
            --jq '.[0].number' 2>/dev/null || true)

          if [[ -z "$PR_NUM" ]]; then
            echo "No PR found for this push — skipping"
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Detect release PRs by head branch name
          PR_DATA=$(gh api "repos/${{ github.repository }}/pulls/${PR_NUM}")
          HEAD_BRANCH=$(echo "$PR_DATA" | jq -r '.head.ref')
          HEAD_SHA=$(echo "$PR_DATA" | jq -r '.head.sha')

          IS_RELEASE="false"
          VERSION=""
          if [[ "$HEAD_BRANCH" == bot/release/* ]]; then
            IS_RELEASE="true"
            VERSION="${HEAD_BRANCH#bot/release/}"
          fi

          # Find the Benchmark workflow run for this PR's head SHA
          RUN_ID=$(gh api "repos/${{ github.repository }}/actions/workflows/benchmark.yml/runs?head_sha=${HEAD_SHA}&status=completed&event=pull_request" \
            --jq '.workflow_runs | map(select(.conclusion == "success")) | sort_by(.updated_at) | last | .id' 2>/dev/null || true)

          if [[ -z "$RUN_ID" || "$RUN_ID" == "null" ]]; then
            echo "No successful Benchmark run found for PR #${PR_NUM} (SHA ${HEAD_SHA}) — skipping"
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "PR #${PR_NUM} (release=$IS_RELEASE version=$VERSION) — benchmark run $RUN_ID"
          echo "should_publish=true" >> "$GITHUB_OUTPUT"
          echo "pr_number=$PR_NUM" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "is_release=$IS_RELEASE" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        if: steps.find.outputs.should_publish == 'true'
        with:
          token: ${{ secrets.PL_PASTEURBOT_PAT_PRIVATE }}
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v7
        if: steps.find.outputs.should_publish == 'true'
        with:
          enable-cache: true

      - name: Install Mosaic
        if: steps.find.outputs.should_publish == 'true'
        run: cp production.uv.lock uv.lock && uv sync --frozen

      - name: Download benchmark artifacts
        if: steps.find.outputs.should_publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID="${{ steps.find.outputs.run_id }}"
          echo "Downloading artifacts from workflow run $RUN_ID"

          ARTIFACTS=$(gh api "repos/${{ github.repository }}/actions/runs/${RUN_ID}/artifacts" \
            --jq '.artifacts[] | select(.name | startswith("results-")) | .id')

          if [[ -z "$ARTIFACTS" ]]; then
            echo "::error::No results-* artifacts found in run $RUN_ID"
            exit 1
          fi

          mkdir -p staging-results
          for AID in $ARTIFACTS; do
            echo "  downloading artifact $AID"
            gh api "repos/${{ github.repository }}/actions/artifacts/${AID}/zip" > "/tmp/art-${AID}.zip"
            ADIR="staging-results/results-${AID}"
            mkdir -p "$ADIR"
            unzip -q -o "/tmp/art-${AID}.zip" -d "$ADIR"
            rm "/tmp/art-${AID}.zip"
          done

          echo "Downloaded $(echo "$ARTIFACTS" | wc -l | tr -d ' ') artifact(s)"

      - name: Merge results from CPU/GPU artifacts
        if: steps.find.outputs.should_publish == 'true'
        run: uv run python .github/scripts/merge-results.py staging-results/ mosaic-results/

      # ── Dev PRs: overlay onto main/ ──────────────────────────────────────
      - name: Publish results to main/ (dev PRs)
        if: >-
          steps.find.outputs.should_publish == 'true'
          && steps.find.outputs.is_release != 'true'
        run: |
          set -euo pipefail
          SHA="${{ steps.find.outputs.head_sha }}"
          SHORT_SHA="${SHA:0:8}"

          git config user.name "PasteurBot"
          git config user.email "${{ vars.PL_PASTEURBOT_EMAIL }}"

          for attempt in 1 2 3; do
            WORK=$(mktemp -d)

            if git fetch origin "$RESULTS_BRANCH" 2>/dev/null; then
              git worktree add "$WORK" "$RESULTS_BRANCH"
            else
              git worktree add --orphan "$WORK" "$RESULTS_BRANCH"
              git -C "$WORK" rm -rf . 2>/dev/null || true
              echo "# Mosaic Benchmark Results" > "$WORK/README.md"
              git -C "$WORK" add README.md
              git -C "$WORK" commit -m "Initialize results branch"
            fi

            # Solver-level merge: preserves solvers not in this PR.
            DEST="$WORK/main"
            MERGE_STAGING=$(mktemp -d)
            uv run python .github/scripts/overlay-results.py \
              "$DEST" mosaic-results "$MERGE_STAGING"

            rm -rf "$DEST"
            mkdir -p "$DEST"
            cp -r "$MERGE_STAGING"/. "$DEST/"

            # Regenerate snapshot so next PR's diff-against is accurate.
            ln -sfn "$DEST" mosaic-results
            uv run mosaic status --format json > "$DEST/snapshot.json"
            uv run mosaic status --format md > "$DEST/status-report.md"

            git -C "$WORK" add .
            if git -C "$WORK" diff --cached --quiet; then
              echo "No changes to commit"
              git worktree remove "$WORK"
              break
            fi
            git -C "$WORK" commit -m "Update main/ from PR #${{ steps.find.outputs.pr_number }} (${SHORT_SHA})

          Source commit: ${SHA}"

            if git -C "$WORK" push origin "$RESULTS_BRANCH"; then
              echo "Published to main/ (attempt $attempt)"
              git worktree remove "$WORK"
              break
            else
              echo "Push failed (attempt $attempt), retrying..."
              git worktree remove "$WORK"
              sleep $((attempt * 2))
            fi
          done

      # ── Release PRs: write {version}/ and reset main/ ───────────────────
      - name: Publish release results (release PRs)
        if: >-
          steps.find.outputs.should_publish == 'true'
          && steps.find.outputs.is_release == 'true'
        run: |
          set -euo pipefail
          VERSION="${{ steps.find.outputs.version }}"
          SHA="${{ steps.find.outputs.head_sha }}"
          SHORT_SHA="${SHA:0:8}"

          if [[ -z "$VERSION" ]]; then
            echo "::error::Could not determine release version"
            exit 1
          fi

          git config user.name "PasteurBot"
          git config user.email "${{ vars.PL_PASTEURBOT_EMAIL }}"

          for attempt in 1 2 3; do
            WORK=$(mktemp -d)

            if git fetch origin "$RESULTS_BRANCH" 2>/dev/null; then
              git worktree add "$WORK" "$RESULTS_BRANCH"
            else
              git worktree add --orphan "$WORK" "$RESULTS_BRANCH"
              git -C "$WORK" rm -rf . 2>/dev/null || true
              echo "# Mosaic Benchmark Results" > "$WORK/README.md"
              git -C "$WORK" add README.md
              git -C "$WORK" commit -m "Initialize results branch"
            fi

            # Generate snapshot and status report.
            uv run mosaic status --format json > snapshot.json
            uv run mosaic status --format md > status-report.md

            # Write release results to {version}/.
            VDEST="$WORK/${VERSION}"
            rm -rf "$VDEST"
            mkdir -p "$VDEST"
            cp snapshot.json status-report.md "$VDEST/"
            cd mosaic-results
            find . -type f \( -name "*.png" -o -name "*.gif" -o -name "result.json" -o -name "params.json" \) | while read f; do
              mkdir -p "$VDEST/$(dirname "$f")"
              cp "$f" "$VDEST/$f"
            done
            cd -

            # Reset main/ to the release baseline.
            rm -rf "$WORK/main"
            cp -r "$VDEST" "$WORK/main"

            git -C "$WORK" add .
            if git -C "$WORK" diff --cached --quiet; then
              echo "No changes to commit"
              git worktree remove "$WORK"
              break
            fi
            git -C "$WORK" commit -m "Release ${VERSION} benchmark results (${SHORT_SHA})

          Source commit: ${SHA}
          Wrote ${VERSION}/ and reset main/"

            if git -C "$WORK" push origin "$RESULTS_BRANCH"; then
              echo "Published release results (attempt $attempt)"
              git worktree remove "$WORK"
              break
            else
              echo "Push failed (attempt $attempt), retrying..."
              git worktree remove "$WORK"
              sleep $((attempt * 2))
            fi
          done
