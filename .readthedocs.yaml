# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details
#
# IMPORTANT: Keep the GitHub webhook ENABLED in RTD project settings
# (Admin > Integrations) so RTD creates an external version and builds a
# preview the moment a PR is pushed.
#
# That first (early) build runs before this PR's benchmark-results-<sha>
# artifact exists, so the external branch below renders baseline content with
# a "results still building" badge (see rtd-pending-badge.sh). Once the
# benchmark run finishes and uploads the artifact, benchmark.yml triggers a
# second build via the RTD API that overlays the real PR results.
#
# For latest/stable/release (non-PR) versions, builds are still triggered
# explicitly from publish-results.yml after artifacts are uploaded.

# Required
version: 2

# Set the OS, Python version, and other tools you might need
build:
  os: ubuntu-24.04
  tools:
    python: "3.13"

  jobs:
    create_environment:
      - asdf plugin add uv
      - asdf install uv latest
      - asdf global uv latest
      - uv venv
    install:
      - cp production.uv.lock uv.lock
      - uv sync --frozen --extra dev
      # Quarto CLI (not a Python package)
      - wget -q https://github.com/quarto-dev/quarto-cli/releases/download/v1.7.31/quarto-1.7.31-linux-amd64.deb -O /tmp/quarto.deb
      - dpkg -x /tmp/quarto.deb /tmp/quarto
    build:
      html:
        # Fetch benchmark results from the baseline artifact.
        # For release builds (tag), try the release-specific artifact first.
        # For PR builds (external), also try the PR's own results artifact.
        # GITHUB_TOKEN must be added as an RTD environment variable.
        # ── BISECT: stage markers + suspect steps disabled ───────────────
        # Temporarily isolating which build.html step fails on external (PR)
        # builds. Each surviving step echoes a STAGE marker so the (possibly
        # truncated) log shows how far the build got. Artifact fetching and
        # generate_results.py are commented out for this run; if the build now
        # succeeds, the failure is in one of those; if it still fails, the
        # cause is install / generate.py / quarto render (likely RTD-side).
        - 'echo "STAGE 1 - build.html start (version_type=$READTHEDOCS_VERSION_TYPE)"'
        # --- artifact fetch / badge (DISABLED for bisect; see git history) ---
        - 'echo "STAGE 2 - artifact fetch skipped (bisect)"'
        # Generate solver reference page
        - 'echo "STAGE 3 - running generate.py" && uv run python docs/generate.py'
        # --- results page generation (DISABLED for bisect; see git history) ---
        - 'echo "STAGE 4 - generate_results.py skipped (bisect)"'
        # Render with Quarto
        - 'echo "STAGE 5 - rendering with quarto" && uv run /tmp/quarto/opt/quarto/bin/quarto render --output-dir $READTHEDOCS_OUTPUT/html'
        - 'echo "STAGE 6 - build.html complete"'
