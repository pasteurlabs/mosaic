# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details
#
# IMPORTANT: Disable the default GitHub webhook in RTD project settings
# (Admin > Integrations). Builds are triggered explicitly by GitHub Actions
# workflows (publish-results.yml, benchmark.yml) via the RTD API to ensure
# benchmark artifacts are uploaded before the docs build starts.

# Required
version: 2

# Set the OS, Python version, and other tools you might need
build:
  os: ubuntu-24.04
  tools:
    python: "3.13"

  jobs:
    create_environment:
      - asdf plugin add uv
      - asdf install uv latest
      - asdf global uv latest
      - uv venv
    install:
      - cp production.uv.lock uv.lock
      - uv sync --frozen --extra dev
      # Quarto CLI (not a Python package)
      - wget -q https://github.com/quarto-dev/quarto-cli/releases/download/v1.7.31/quarto-1.7.31-linux-amd64.deb -O /tmp/quarto.deb
      - dpkg -x /tmp/quarto.deb /tmp/quarto
    build:
      html:
        # Fetch benchmark results from the baseline artifact.
        # For release builds (tag), try the release-specific artifact first.
        # For PR builds (external), also try the PR's own results artifact.
        # GITHUB_TOKEN must be added as an RTD environment variable.
        - |
          export GITHUB_REPO="pasteurlabs/mosaic"
          export GITHUB_TOKEN="${GITHUB_TOKEN:-}"
          if [ -z "$GITHUB_TOKEN" ]; then
            echo "GITHUB_TOKEN not set — docs will build without benchmark results"
          else
            FETCHED=false
            # Release builds: try release-specific artifact first
            if [ "$READTHEDOCS_VERSION_TYPE" = "tag" ]; then
              if bash .github/scripts/fetch-artifact.sh \
                   "release-${READTHEDOCS_VERSION_NAME}" mosaic-results; then
                FETCHED=true
              fi
            fi
            # PR builds: try the PR's benchmark results artifact, overlaid on baseline
            if [ "$READTHEDOCS_VERSION_TYPE" = "external" ]; then
              # Fetch baseline first
              bash .github/scripts/fetch-artifact.sh baseline mosaic-results || true
              # Overlay PR-specific results (benchmark-results-<sha>)
              if bash .github/scripts/fetch-artifact.sh \
                   "benchmark-results-${READTHEDOCS_GIT_COMMIT_HASH}" \
                   /tmp/pr-results; then
                # PR results contain mosaic-results/ at the top level
                if [ -d /tmp/pr-results/mosaic-results ]; then
                  cp -r /tmp/pr-results/mosaic-results/* mosaic-results/ 2>/dev/null || true
                else
                  cp -r /tmp/pr-results/* mosaic-results/ 2>/dev/null || true
                fi
                rm -rf /tmp/pr-results
                FETCHED=true
              fi
            fi
            # Default: fetch baseline artifact
            if [ "$FETCHED" = "false" ]; then
              bash .github/scripts/fetch-artifact.sh baseline mosaic-results || true
            fi
          fi
        # Generate solver reference and results pages
        - uv run python docs/generate.py
        - |
          if [ -d mosaic-results ] && [ "$(ls mosaic-results/ 2>/dev/null)" ]; then
            uv run python docs/generate_results.py
          else
            echo "No benchmark results available — skipping results page generation"
          fi
        # Render with Quarto
        - uv run /tmp/quarto/opt/quarto/bin/quarto render --output-dir $READTHEDOCS_OUTPUT/html
