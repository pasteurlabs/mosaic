# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2

# Set the OS, Python version, and other tools you might need
build:
  os: ubuntu-24.04
  tools:
    python: "3.13"

  jobs:
    create_environment:
      - asdf plugin add uv
      - asdf install uv latest
      - asdf global uv latest
      - uv venv
    install:
      - cp production.uv.lock uv.lock
      - uv sync --frozen --extra dev
      # Quarto CLI (not a Python package)
      - wget -q https://github.com/quarto-dev/quarto-cli/releases/download/v1.7.31/quarto-1.7.31-linux-amd64.deb -O /tmp/quarto.deb
      - dpkg -x /tmp/quarto.deb /tmp/quarto
    build:
      html:
        # Fetch benchmark results from the results branch (if available)
        - |
          if git fetch origin benchmark-results 2>/dev/null; then
            # RTD sets READTHEDOCS_VERSION_TYPE to "tag" for release builds,
            # "branch" for main. Pick the matching results directory.
            if [ "$READTHEDOCS_VERSION_TYPE" = "tag" ]; then
              RESULTS_DIR="$READTHEDOCS_VERSION"
            else
              RESULTS_DIR="main"
            fi
            # Try preferred dir first, fall back to main/
            for dir in "$RESULTS_DIR" main; do
              git checkout origin/benchmark-results -- "$dir/" 2>/dev/null || continue
              if [ -d "$dir" ]; then
                mkdir -p mosaic-results
                for domain_dir in "$dir"/*/; do
                  domain=$(basename "$domain_dir")
                  [ -d "$domain_dir" ] || continue
                  cp -r "$domain_dir" "mosaic-results/$domain"
                done
                echo "Restored benchmark results from $dir/ (version type: ${READTHEDOCS_VERSION_TYPE:-unknown})"
                break
              fi
            done
          fi
        # Generate solver reference and results pages
        - uv run python docs/generate.py
        - |
          if [ -d mosaic-results ] && [ "$(ls mosaic-results/)" ]; then
            uv run python docs/generate_results.py
          fi
        # Render with Quarto
        - uv run /tmp/quarto/opt/quarto/bin/quarto render --output-dir $READTHEDOCS_OUTPUT/html
