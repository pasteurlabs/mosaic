# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details
#
# Docs are NOT built here. They are rendered on GitHub Actions
# (benchmark.yml / publish-results.yml), where the full mosaic/jax stack is
# installed and memory is ample, then uploaded as a `docs-site-<sha>` artifact.
# RTD's constrained builders OOM-kill the heavy `import mosaic`, so RTD just
# downloads and serves the pre-rendered site (see rtd-serve-site.sh).
#
# IMPORTANT:
#   * Keep the GitHub webhook ENABLED in RTD (Admin > Integrations) so RTD
#     creates an external version and a preview build the moment a PR is
#     pushed. If the rendered artifact isn't ready yet, that early build shows
#     a "building" placeholder; benchmark.yml triggers a follow-up build via
#     the RTD API once the site artifact is uploaded.
#   * GITHUB_TOKEN must be set as an RTD environment variable (actions:read)
#     so the rendered artifact can be downloaded.

# Required
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.13"
  commands:
    # No environment / render needed — fetch the pre-rendered site artifact
    # built on GitHub Actions and serve it from RTD's HTML output directory.
    - bash .github/scripts/rtd-serve-site.sh "$READTHEDOCS_OUTPUT/html"
