# Template: Incompressible Navier-Stokes on a periodic grid (IC recovery)
#
# Based on the ns-grid domain. Extend to new boundary conditions, obstacle
# geometries, or optimisation objectives by modifying the IC generator and
# physics parameters.

name: ns-periodic
description: >
  Incompressible Navier-Stokes on a periodic square/cube grid.  Solvers take
  an initial velocity field and return the evolved velocity field.  The primary
  optimisation task is initial-condition recovery.

schema_module: mosaic_shared.problems.navier_stokes_grid
output_key: result
ic_key: v0
domain_extent: 6.283185307179586 # 2*pi

resolution_key: N

physics_defaults:
  N: 64
  dt: 0.01
  steps: 100
  viscosity: 0.05

ic_defaults:
  name: vortex
  seed: 42

forward:
  agreement:
    - ic: { name: vortex, seed: 42 }
      physics: { N: 64, dt: 0.01, steps: 100, viscosity: 0.05 }
      sweep: { key: N, values: [32, 64, 96, 128] }
  baseline:
    - ic: { name: vortex, seed: 42 }
      physics: { N: 64, dt: 0.01, steps: 1, viscosity: 0.05 }

gradient:
  fd_check:
    - ic: { name: vortex, seed: 42 }
      physics: { N: 16, dt: 0.05, steps: 5, viscosity: 0.1 }
      fd: { eps_values: [5.0, 1.0, 0.1, 0.01, 0.001, 0.0001], n_dirs: 20 }
  horizon_sweep:
    - ic: { name: vortex, seed: 42 }
      physics: { N: 16, dt: 0.05, viscosity: 0.1 }
      sweep: { key: steps, values: [1, 2, 5, 10, 20, 50] }

cost:
  cost:
    n_trials: 3
    N_values: [16, 32, 64, 128]
    steps_values: [10, 50, 100, 200]

optimization:
  recovery_constant_ic:
    - ic: { name: vortex, seed: 42 }
      physics: { N: 32, dt: 0.01, steps: 20, viscosity: 0.05 }
      optim: { lr: 0.005, steps: 300, patience: 50 }
