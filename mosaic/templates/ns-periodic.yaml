# Template: Incompressible Navier-Stokes on a periodic grid (IC recovery).
#
# Based on the ns-grid domain. Extend to new boundary conditions, obstacle
# geometries, or optimisation objectives by editing the generated ics.py /
# physics.py / experiments.py.

name: ns-periodic
description: >
  Incompressible Navier-Stokes on a doubly-periodic square domain with viscosity ν
  as the primary control parameter. Solvers take an initial velocity field and
  return the evolved field; the primary optimisation tasks are initial-condition
  recovery and inflow-profile drag optimisation.

category_label: Navier-Stokes (Grid)
bc_description: >
  Doubly-periodic square domain [0, 2π]²; incompressibility enforced via pressure
  projection at each time step. No walls or inflow/outflow boundaries.

schema_module: mosaic_shared.problems.navier_stokes_grid
output_key: result
ic_key: v0
domain_extent: 6.283185307179586 # 2π
resolution_key: N

physics_defaults:
  N: 64
  dt: 0.01
  steps: 100
  nu: 0.05

# All scaffold experiments reference this IC by name; the generated ics.py
# registers `_default_ic` under the same key. Edit ics.py to add more ICs.
ic_defaults:
  name: default
  seed: 42

forward:
  baseline:
    - ic: { name: default, seed: 0 }
      physics: { N: [16, 32, 64, 128], nu: 0.05, dt: 0.01, steps: 1 }
  agreement:
    - ic: { name: default, seed: 42 }
      physics:
        { N: 64, dt: 0.05, steps: 20, nu: [0.001, 0.005, 0.01, 0.02, 0.05] }

gradient:
  fd_check:
    - ic: { name: default, seed: 42 }
      physics: { N: 16, nu: 0.001, dt: 0.05, steps: 20 }
      fd: { eps_values: [5.0, 1.0, 0.1, 0.01, 0.001, 0.0001], n_dirs: 20 }
  param_sweep:
    - ic: { name: default, seed: 42 }
      physics: { N: 16, dt: 0.05, steps: 50, nu: [0.05, 0.01, 0.005, 0.001] }
      fd: { eps_values: [1.0, 0.1, 0.01, 0.001], n_dirs: 8 }

cost:
  spatial_cost:
    - physics: { nu: 0.01, dt: 0.01, steps: 100, N: [64, 128, 192, 256] }
      cost: { n_trials: 3 }
  temporal_cost:
    - physics: { nu: 0.01, dt: 0.01, N: 128, steps: [10, 50, 100, 500, 1000] }
      cost: { n_trials: 3 }

optimization:
  recovery:
    - ic: { name: default, seed: 42 }
      physics: { N: 32, dt: 0.01, steps: 20, nu: 0.05 }
      optim: { lr: 0.005, max_iters: 300, patience: 50 }
