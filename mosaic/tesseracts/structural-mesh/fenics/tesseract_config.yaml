name: fenics_structural_mesh
version: "0.1.0"
description: >
  FEniCS/DOLFIN CG1 FEM linear-elasticity solver with SIMP penalisation. Gradient ∂C/∂ρ via
  dolfin-adjoint tape replay (discrete adjoint derived at the variational level via UFL).
build_config:
  base_image: "condaforge/miniforge3:24.11.2-0"
  requirements:
    provider: conda
  package_data:
    - ["../../../mosaic_shared", "/tmp/mosaic_shared"]
  custom_build_steps:
    - "RUN /python-env/bin/pip install /tmp/mosaic_shared"

metadata:
  mosaic:
    name: "FEniCS"
    backend: fenics
    family: fem
    scheme: "FEM CG1 linear elasticity (SIMP, dolfin-adjoint)"
    discretization: FE
    numerics: "GMRES+AMG"
    ad_strategy: adjoint
    differentiable: true
    uses_gpu: false
    internal_dtype: float64
    doc_url: "https://fenicsproject.org/"
