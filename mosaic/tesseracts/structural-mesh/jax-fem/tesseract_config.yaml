name: jax_fem_structural_mesh
version: "0.2.0"
description: >
  JAX-FEM HEX8 linear-elasticity solver with SIMP stiffness E(ρ) = E_min + (E_max −
  E_min)·ρ^penal. Gradient ∂C/∂ρ via JAX automatic differentiation through the linear FE
  solve (hybrid implicit-function-theorem adjoint).
build_config:
  target_platform: "native"
  base_image: "condaforge/miniforge3:26.1.1-3"
  requirements:
    provider: conda
  extra_packages:
    - libgl1
  package_data:
    - ["../../../mosaic_shared", "/tmp/mosaic_shared"]
  custom_build_steps:
    - "RUN /python-env/bin/pip install /tmp/mosaic_shared"

metadata:
  mosaic:
    name: "JAX-FEM"
    backend: jax
    family: fem
    scheme: "FEM HEX8 linear elasticity (SIMP, adjoint AD)"
    discretization: FE
    numerics: "Direct (UMFPACK)"
    ad_strategy: hybrid
    differentiable: true
    uses_gpu: true
    internal_dtype: float32
    doc_url: "https://github.com/deepmodeling/jax-fem"
