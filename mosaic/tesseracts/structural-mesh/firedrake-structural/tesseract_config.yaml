name: firedrake_structural_mesh
version: "0.1.0"
description: >
  Firedrake CG1 FEM linear-elasticity solver with SIMP penalisation. Gradient ∂C/∂ρ via
  firedrake-adjoint (pyadjoint ReducedFunctional) — an independent tape-based discrete
  adjoint complement to FEniCS.
build_config:
  base_image: "firedrakeproject/firedrake:2026.4.0"
  skip_checks: true
  # Reuse Firedrake (and its deps) pre-installed in the vendor base image via
  # --system-site-packages, instead of manually copying its editable-install
  # .pth/finder files into the tesseract venv (which broke on every version bump).
  inherit_base_image_packages: true
  package_data:
    - ["../../../mosaic_shared", "/tmp/mosaic_shared"]
  custom_build_steps:
    - "RUN /python-env/bin/pip install /tmp/mosaic_shared meshio scipy"

metadata:
  mosaic:
    name: "Firedrake"
    backend: firedrake
    family: fem
    scheme: "FEM CG1 linear elasticity (SIMP, pyadjoint ReducedFunctional)"
    discretization: FE
    numerics: "GMRES+AMG"
    ad_strategy: adjoint
    differentiable: true
    uses_gpu: false
    internal_dtype: float64
    doc_url: "https://www.firedrakeproject.org/"
