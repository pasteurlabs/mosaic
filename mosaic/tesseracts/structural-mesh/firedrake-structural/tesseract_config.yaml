name: firedrake_structural_mesh
version: "0.1.0"
description: >
  Firedrake CG1 FEM linear-elasticity solver with SIMP penalisation. Gradient ∂C/∂ρ via
  firedrake-adjoint (pyadjoint ReducedFunctional) — an independent tape-based discrete
  adjoint complement to FEniCS.
build_config:
  base_image: "firedrakeproject/firedrake:2026.4.0"
  skip_checks: true
  package_data:
    - ["../../mosaic_shared", "/tmp/mosaic_shared"]
  custom_build_steps:
    - "RUN cp /usr/local/lib/python3.12/dist-packages/__editable__.firedrake-2026.4.0.pth /python-env/lib/python3.12/site-packages/ && cp /usr/local/lib/python3.12/dist-packages/__editable___firedrake_2026_4_0_finder.py /python-env/lib/python3.12/site-packages/ && cp /usr/local/lib/python3.12/dist-packages/a1_coverage.pth /python-env/lib/python3.12/site-packages/ && echo /usr/local/lib/python3.12/dist-packages > /python-env/lib/python3.12/site-packages/firedrake_deps.pth"
    - "RUN /python-env/bin/pip install /tmp/mosaic_shared meshio scipy"

metadata:
  mosaic:
    name: "Firedrake"
    backend: firedrake
    family: fem
    scheme: "FEM CG1 linear elasticity (SIMP, pyadjoint ReducedFunctional)"
    discretization: FE
    numerics: "GMRES+AMG"
    ad_strategy: adjoint
    differentiable: true
    uses_gpu: false
    internal_dtype: float64
    doc_url: "https://www.firedrakeproject.org/"
