name: jax_cfd_navier_stokes_grid
version: "0.1.0"
description: >
  JAX-native incompressible Navier–Stokes solver on a staggered MAC grid with
  finite-difference advection and spectral FFT pressure projection. Gradients via JAX
  source-transformation AD through the time loop.
build_config:
  base_image: "nvidia/cuda:12.6.3-runtime-ubuntu24.04"
  package_data: []
  custom_build_steps:
    - 'ENV XLA_FLAGS="--xla_gpu_enable_cublaslt=false --xla_gpu_autotune_level=0"'
    - "ENV XLA_PYTHON_CLIENT_PREALLOCATE=false"
    - "ENV XLA_PYTHON_CLIENT_MEM_FRACTION=0.6"

metadata:
  mosaic:
    name: "jax-cfd"
    backend: jax
    family: projection
    scheme: "MAC FD + projection"
    discretization: FD
    numerics: "Projection, semi-implicit"
    ad_strategy: autodiff
    differentiable: true
    uses_gpu: true
    internal_dtype: float32
    doc_url: "https://github.com/google/jax-cfd"
