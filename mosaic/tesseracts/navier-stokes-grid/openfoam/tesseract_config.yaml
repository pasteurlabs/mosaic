name: openfoam_navier_stokes_grid
version: "0.1.0"
description: >
  OpenFOAM icoFoam PISO solver run as a forward-only reference baseline (C++ subprocess). No
  reverse-mode AD; used to anchor cross-solver comparisons.
build_config:
  package_data: []

  extra_packages:
    - wget
    - software-properties-common

  base_image: "ubuntu:24.04"
  target_platform: "linux/x86_64"

  custom_build_steps:
    - USER root
    - |
      RUN sh -c "wget -O - https://dl.openfoam.org/gpg.key > /etc/apt/trusted.gpg.d/openfoam.asc" && \
          add-apt-repository http://dl.openfoam.org/ubuntu && \
          apt-get update && \
          apt-get install -y --no-install-recommends openfoam12 && \
          rm -rf /var/lib/apt/lists/*

metadata:
  mosaic:
    name: "OpenFOAM"
    backend: cpp
    family: projection
    scheme: "icoFoam PISO"
    discretization: FV
    numerics: "PISO/PIMPLE, Euler"
    ad_strategy: null
    differentiable: false
    uses_gpu: false
    internal_dtype: float64
    doc_url: "https://www.openfoam.com/documentation/overview"
