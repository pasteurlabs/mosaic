name: phiflow_navier_stokes_grid
version: "0.1.0"
description: >
  Semi-Lagrangian advection with CG pressure projection, unconditionally stable at large dt.
  Gradients via JAX autodiff combined with analytic adjoint rules through the same
  simulation code.
build_config:
  base_image: "nvidia/cuda:12.6.3-runtime-ubuntu24.04"
  package_data: []
env:
  XLA_PYTHON_CLIENT_PREALLOCATE: "false"
  XLA_PYTHON_CLIENT_MEM_FRACTION: "0.5"
  # Disable GEMM autotuning to prevent CUDA OOM in 3D recovery experiments on
  # 16 GiB V100 GPUs. Disable cuBLAS-LT to prevent "Failed to initialize BLAS
  # support" crash when GPU is busy/unavailable (same fix as xlb container).
  XLA_FLAGS: "--xla_gpu_autotune_level=0 --xla_gpu_enable_cublaslt=false"

metadata:
  mosaic:
    name: "PhiFlow"
    backend: jax
    family: projection
    scheme: "semi-Lagrangian + projection"
    discretization: FD
    numerics: "Semi-Lagrangian, Euler"
    ad_strategy: hybrid
    differentiable: true
    uses_gpu: true
    internal_dtype: float32
    doc_url: "https://tum-pbs.github.io/PhiFlow/"
