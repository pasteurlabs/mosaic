name: spectral_euler_navier_stokes_grid
version: "0.1.0"
description: |
  Minimal spectral forward-Euler solver for 2D incompressible Navier-Stokes.
  Solves the vorticity equation with FFT-based spectral differentiation and
  explicit Euler time stepping.  Enforces incompressibility to machine precision
  via the stream-function formulation.  Intended as a CI smoke-test solver.

build_config:
  package_data: []
  custom_build_steps:
    - "ENV XLA_PYTHON_CLIENT_PREALLOCATE=false"

metadata:
  mosaic:
    name: "Spectral Euler"
    backend: jax
    family: spectral
    scheme: "spectral forward-Euler"
    color: "#AA3377"
    linestyle: ":"
    marker: "D"
    ad_strategy: autodiff
    differentiable: true
    uses_gpu: true
    internal_dtype: float32
    description: "Minimal spectral forward-Euler solver for CI testing."
    doc_url: ""
