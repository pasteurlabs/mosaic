name: exponax_navier_stokes_grid
version: "0.1.0"
description: >
  Exponential time-differencing Runge–Kutta (ETDRK) spectral integrator for 3D
  Navier–Stokes, enforcing incompressibility to machine precision by construction. Gradients
  via JAX source-transformation AD.
build_config:
  base_image: "nvidia/cuda:12.6.3-runtime-ubuntu24.04"
  package_data: []
env:
  XLA_PYTHON_CLIENT_PREALLOCATE: "false"
  XLA_PYTHON_CLIENT_MEM_FRACTION: "0.6"

metadata:
  mosaic:
    name: "Exponax"
    backend: jax
    family: spectral
    scheme: "spectral ETDRK"
    discretization: Spectral
    numerics: ETDRK
    ad_strategy: autodiff
    differentiable: true
    uses_gpu: true
    internal_dtype: float32
    doc_url: "https://fkoehler.site/exponax/"
