name: ins_navier_stokes_grid
version: "0.1.0"
description: >
  Julia staggered finite-volume solver with spectral pressure projection and RK4 time
  integration; run on CPU in this benchmark (the library itself also supports CUDA via
  KernelAbstractions.jl). Differentiates through the time loop via Zygote.jl reverse-mode AD.
build_config:
  custom_build_steps:
    - "RUN apt-get update -qq && apt-get install -y -q --no-install-recommends wget ca-certificates gcc g++ && rm -rf /var/lib/apt/lists/*"
    - "RUN wget -q https://julialang-s3.julialang.org/bin/linux/x64/1.11/julia-1.11.3-linux-x86_64.tar.gz -O /tmp/julia.tar.gz && tar -xzf /tmp/julia.tar.gz -C /usr/local --strip-components=1 && rm /tmp/julia.tar.gz"
    # PackageCompiler.create_sysimage(...) used to bake an AOT system image
    # but added many minutes on CI for this dep tree. The benchmark reuses
    # one container across many calls, so a one-time JIT cost on first call
    # is a net win over paying the sysimage build cost every push. Removed
    # PackageCompiler from the package list — it's no longer imported.
    - 'RUN mkdir -p /app/julia_env /app/julia_depot && julia --project=/app/julia_env -e ''using Pkg; Pkg.add([Pkg.PackageSpec(name="IncompressibleNavierStokes", version="5.0.0"), Pkg.PackageSpec(name="Zygote", version="0.7.10")]); Pkg.precompile()'''
    - "RUN chmod -R 777 /app"
env:
  JULIA_PROJECT: "/app/julia_env"
  PYTHON_JULIAPKG_PROJECT: "/app/julia_env"
  JULIA_DEPOT_PATH: "/app/julia_depot"
  JULIA_CPU_TARGET: "generic"
  JULIA_EXECUTABLE: "/usr/local/bin/julia"

metadata:
  mosaic:
    name: "INS.jl"
    backend: julia
    family: projection
    scheme: "FV + projection"
    discretization: FV
    numerics: "Projection, RK4"
    ad_strategy: autodiff
    differentiable: true
    uses_gpu: false
    internal_dtype: float32
    doc_url: "https://agdestein.github.io/IncompressibleNavierStokes.jl/dev/"
