name: xlb_navier_stokes_grid
version: "0.1.0"
description: |
  Differentiable 2D/3D incompressible Navier-Stokes solver using the Lattice Boltzmann
  Method (LBM) with BGK collision, backed by XLB + JAX.

  Lattice: D2Q9 for 2D (nz=1, ndim=2), D3Q19 for 3D (ndim=3).

  Operates in lattice units: input velocities should satisfy |u| << 1/sqrt(3) ≈ 0.577
  for numerical stability (Ma << 1). A practical safe maximum is |u| ≤ 0.1.
  The relaxation parameter omega = 1/(3*viscosity + 0.5) sets the effective kinematic
  viscosity. Stability requires viscosity > 0.

  The forward pass uses a pure-JAX implementation (stream → macroscopic → equilibrium
  → BGK collision) with jax.lax.scan for O(1) compile time. VJP/JVP flow through
  the entire rollout via JAX autodiff. Both apply() and vjp_jit() run in float64
  internally (output cast to float32) to avoid float32 quantization noise dominating
  FD gradient checks at fine ε (omega≈2 at low viscosity).

  Interface: v0 (nx, ny, 1, 2) or (nx, ny, nz, 3) → result same shape.

build_config:
  base_image: "nvidia/cuda:12.6.3-runtime-ubuntu24.04"
  package_data: []
  custom_build_steps:
    - 'ENV XLA_FLAGS="--xla_gpu_enable_cublaslt=false --xla_gpu_autotune_level=0"'
    - "ENV XLA_PYTHON_CLIENT_PREALLOCATE=false"
    # xlb 0.3.1's operator/stepper/__init__.py unconditionally imports IBMStepper,
    # which does `from warp.utils import ScopedTimer`. ScopedTimer was moved out of
    # warp.utils in warp-lang>=1.10, but xlb 0.3.1's metadata pins warp-lang>=1.10,
    # so any install of xlb 0.3.1 explodes on `import xlb`. We don't use IBMStepper,
    # so drop that line from the stepper package's __init__.
    - 'RUN python3 -c "import sysconfig, pathlib; p = pathlib.Path(sysconfig.get_paths()[''purelib'']) / ''xlb/operator/stepper/__init__.py''; p.write_text(''''.join(l for l in p.read_text().splitlines(keepends=True) if ''ibm_stepper'' not in l))"'

metadata:
  mosaic:
    name: "XLB"
    backend: jax
    family: lbm
    scheme: "LBM BGK/KBC D2Q9"
    color: "#66CCEE"
    linestyle: "(0, (3, 1, 1, 1))"
    marker: "P"
    ad_strategy: autodiff
    differentiable: true
    uses_gpu: true
    internal_dtype: float64
    description: >
      JAX-accelerated LBM D2Q9 using XLB's BGK (default) / entropic-stabilised
      KBC (2-D obstacle flows), Stream, QuadraticEquilibrium, and Macroscopic
      operators (xlb 0.3.1) inside a jax.lax.scan time loop; incompressibility
      recovered in the low-Mach limit. VJP flows through the full scan unroll in
      float64 precision and is routed per diff-input key (v0, viscosity, dt,
      inflow_profile). Both apply() and vjp_jit() run in float64
      internally (output cast to float32) to avoid float32 quantization noise at
      fine ε (omega≈2 at low viscosity). FD cosine ≥0.9999 at ε=1.0.
    doc_url: "https://github.com/Autodesk/XLB"
