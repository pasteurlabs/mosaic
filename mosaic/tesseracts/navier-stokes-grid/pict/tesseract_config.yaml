name: pict_navier_stokes_grid
version: "0.1.0"
description: >
  GPU-accelerated differentiable PISO solver built on PyTorch with custom CUDA kernels
  (PISOtorch). VJP w.r.t. v0 and inflow_profile through the time loop via torch.autograd;
  viscosity and dt are static scalars without gradients.
build_config:
  package_data: []
  target_platform: "linux/amd64"
  # skip_checks: PISOtorch_simulation asserts torch.cuda.is_available() at
  # import time, which fails in the GPU-less Docker build environment.
  # The assertion passes correctly at runtime when a GPU is present.
  skip_checks: true
  # No CUDA base image needed: torch's nvidia-* pip deps provide the CUDA
  # runtime, nvidia-cuda-nvcc-cu12 provides nvcc for building PISOtorch's
  # CUDA extensions, and the GPU driver is injected at runtime by
  # nvidia-container-toolkit on the host.
  # torch==2.5.1+cu121 is pinned in requirements to avoid cu128/cu130 mismatch.
  # No extra_packages — build-only deps (ninja, gcc, nvcc) are installed in
  # custom_build_steps so they only appear in run_stage, avoiding duplication
  # across the two-stage Dockerfile and saving ~200 MB of disk during build.
  custom_build_steps:
    # Install build tools + nvcc for compiling PISOtorch CUDA extensions.
    # All CUDA runtime libs come from torch's nvidia-* pip deps.
    - |
      RUN apt-get update \
        && apt-get install -y --no-install-recommends \
           wget ca-certificates ninja-build git build-essential python3-dev \
        && wget -qO /tmp/cuda-keyring.deb https://developer.download.nvidia.com/compute/cuda/repos/debian12/x86_64/cuda-keyring_1.1-1_all.deb \
        && dpkg -i /tmp/cuda-keyring.deb && rm /tmp/cuda-keyring.deb \
        && apt-get update \
        && apt-get install -y --no-install-recommends \
           cuda-nvcc-12-3 cuda-cudart-dev-12-3 libcublas-dev-12-3 libcusparse-dev-12-3 \
        && rm -rf /var/lib/apt/lists/*
    - |
      ENV CUDA_HOME=/usr/local/cuda \
          PATH=/usr/local/cuda/bin:${PATH} \
          TORCH_CUDA_ARCH_LIST=7.0;7.5;8.0;8.6;9.0
    - |
      RUN TORCH_LIB=$(python -c "import torch; print(torch.__path__[0])")/lib \
        && echo "${TORCH_LIB}" > /etc/ld.so.conf.d/torch.conf && ldconfig
    - "RUN wget -qO /tmp/pict.tar.gz https://github.com/tum-pbs/PICT/archive/72a6e86ef3b5.tar.gz && tar -xzf /tmp/pict.tar.gz -C /opt && mv /opt/PICT-* /opt/pict && rm /tmp/pict.tar.gz"
    - "RUN pip install setuptools wheel"
    # Limit nvcc parallelism to 1 thread — PICT's setup.py uses
    # --threads=os.cpu_count() which OOMs on memory-constrained CI runners.
    - "RUN sed -i 's/os.cpu_count()/1/g' /opt/pict/extensions/setup.py"
    - "RUN cd /opt/pict/extensions && MAX_JOBS=2 pip install . --no-build-isolation --no-deps"
    # PISOtorch_simulation.py / PISOtorch_diff.py / lib/ live at the PICT repo
    # root and aren't pip-installable. Drop a .pth file into site-packages so
    # they're on sys.path for every Python invocation.
    - |
      RUN PY_SITE=$(python -c "import site; print(site.getsitepackages()[0])") \
        && echo /opt/pict > "${PY_SITE}/pict.pth"

metadata:
  mosaic:
    name: "PICT"
    backend: pytorch
    family: projection
    scheme: "PISO (2nd-order)"
    discretization: FV
    numerics: "PISO, BDF1"
    ad_strategy: autodiff
    differentiable: true
    uses_gpu: true
    internal_dtype: float32
    doc_url: "https://github.com/tum-pbs/PICT"
