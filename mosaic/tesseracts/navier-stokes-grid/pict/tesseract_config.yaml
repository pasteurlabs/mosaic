name: pict_navier_stokes_grid
version: "0.1.0"
description: |
  Differentiable 2D incompressible Navier-Stokes solver using PICT
  (Physics-Informed Continuous-Time) from TU Munich's Physics-Based
  Simulation group, backed by custom CUDA kernels wrapped with PyTorch autograd.

  PICT implements a validated 2nd-order PISO (Pressure-Implicit with Splitting
  of Operators) algorithm on structured multi-block Cartesian grids.  The
  solver is fully differentiable: running with differentiable=True switches the
  backend to PISOtorch_diff, which preserves the PyTorch computational graph
  through every advection step, pressure solve, and velocity-correction step,
  enabling backpropagation through the entire time loop via torch.autograd.

  Domain setup: a single N×N block with uniform Cartesian mesh is created.
  All four faces are left at their default boundary condition, which in PICT
  is periodic — matching the canonical InputSchema requirement that
  boundary_conditions be fully periodic.

  Physical ↔ solver mapping:
    The block is created with CreateBlockWithSize(N, N) so each cell has
    unit lattice size 1.  A uniform vertex-coordinate grid is constructed
    to represent the physical domain_extent×domain_extent square, scaling
    the cell size to dx = domain_extent / N.  Velocities are set directly
    via block.setVelocity() and extracted via block.velocity.

  VJP flows through torch.autograd backprop across the differentiable PISO
  time loop.  PISOtorch_diff tracks VELOCITY, BOUNDARY_VELOCITY, and
  VISCOSITY gradient chains, so v0 and inflow_profile receive non-zero grads
  when passed as live torch leaves.  viscosity and dt are consumed as Python
  scalars and their grads remain zero.  After each
  backward pass opt_domain.Detach() is called to break the cyclic reference
  that would otherwise cause a memory leak.

  Requirements: CUDA-capable GPU (PICT is GPU-only; the PISOtorch C++
  extension targets CUDA).

  Interface:
    Input:  v0 (N, N, 1, 2) — initial velocity field in physical units
    Output: result — same shape — final velocity in physical units

build_config:
  package_data: []
  # skip_checks: PISOtorch_simulation asserts torch.cuda.is_available() at
  # import time, which fails in the GPU-less Docker build environment.
  # The assertion passes correctly at runtime when a GPU is present.
  skip_checks: true
  # Use CUDA 12.1 devel image: nvcc available for PISOtorch CUDA extension.
  # CUDA 12.1 requires driver >= 525.60; host has driver 535.274 → compatible.
  # torch==2.5.1+cu121 is pinned in requirements to avoid the cu128/cu130
  # mismatch that the unconstrained torch>=2.1.0 spec would select.
  base_image: "nvidia/cuda:12.1.1-devel-ubuntu22.04"
  extra_packages:
    - ninja-build
    - git
    - build-essential
    - python3-dev
  custom_build_steps:
    - "ENV CUDA_HOME=/usr/local/cuda"
    - "ENV PATH=/usr/local/cuda/bin:${PATH}"
    - "ENV TORCH_CUDA_ARCH_LIST=7.0;7.5;8.0;8.6;9.0"
    - "ENV LD_LIBRARY_PATH=/python-env/lib/python3.10/site-packages/torch/lib:${LD_LIBRARY_PATH}"
    - "RUN git -c http.sslVerify=false clone https://github.com/tum-pbs/PICT.git /opt/pict"
    - "RUN pip install setuptools wheel"
    - "RUN cd /opt/pict/extensions && python3 setup.py install"
    - "RUN echo '/opt/pict' > /python-env/lib/python3.10/site-packages/pict.pth"

metadata:
  mosaic:
    name: "PICT"
    backend: pytorch
    family: projection
    scheme: "PISO (2nd-order)"
    color: "#AA44AA"
    linestyle: "(0, (5, 1))"
    marker: "v"
    ad_strategy: autodiff
    differentiable: true
    uses_gpu: true
    description: >
      PISOtorch PISO solver with CUDA kernels; differentiable via PyTorch
      autograd. VJP w.r.t. v0 is fully supported through the differentiable PISO
      time loop. Gradients w.r.t. viscosity and dt are not available: those
      parameters are consumed as Python scalars at domain construction / timestep
      time and have no autograd path; zero gradients are returned for them.
    doc_url: "https://github.com/tum-pbs/PICT"
