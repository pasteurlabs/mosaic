name: warp_ns_navier_stokes_grid
version: "0.1.0"
description: >
  IPCS projection scheme implemented in NVIDIA Warp CUDA kernels with FFT pressure Poisson
  on periodic domains. Gradients via wp.Tape kernel-level VJP.
build_config:
  package_data:
    - ["../../../mosaic_shared", "/tmp/mosaic_shared"]
  custom_build_steps:
    - "RUN /python-env/bin/pip install /tmp/mosaic_shared"

metadata:
  mosaic:
    name: "Warp-NS"
    backend: warp
    family: fd
    scheme: "IPCS (2D+3D), spectral FFT / CG Neumann Poisson, wp.Tape VJP"
    discretization: FD
    numerics: "IPCS, SSP-RK3"
    ad_strategy: autodiff
    differentiable: true
    uses_gpu: true
    internal_dtype: float32
    doc_url: "https://github.com/NVIDIA/warp"
