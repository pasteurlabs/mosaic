name: firedrake_heat_thermal_mesh
version: "0.1.0"
description: >
  Firedrake P1 FEM heat-conduction solver with SIMP penalisation. Gradients (∂C/∂ρ,
  ∂C/∂source) via firedrake-adjoint, complementing the FEniCS reference.
build_config:
  base_image: "firedrakeproject/firedrake:2026.4.0"
  skip_checks: true
  # Reuse Firedrake (and its deps) pre-installed in the vendor base image via
  # --system-site-packages, instead of manually copying its editable-install
  # .pth/finder files into the tesseract venv (which broke on every version bump).
  # mosaic_shared, meshio and scipy are installed from tesseract_requirements.txt,
  # so no package_data copy or custom pip step is needed.
  inherit_base_image_packages: true

metadata:
  mosaic:
    name: "Firedrake"
    backend: firedrake
    family: fem
    scheme: "FEM P1 heat conduction (SIMP, firedrake-adjoint)"
    discretization: FE
    numerics: "GMRES+AMG"
    ad_strategy: adjoint
    differentiable: true
    uses_gpu: false
    internal_dtype: float64
    doc_url: "https://www.firedrakeproject.org/"
