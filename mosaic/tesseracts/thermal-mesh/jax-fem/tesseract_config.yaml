name: jax_fem_thermal_mesh
version: "0.1.0"
description: >
  JAX-FEM HEX8 steady-state heat-conduction solver with SIMP conductivity and optional
  volumetric source. Gradients ∂C/∂ρ and ∂C/∂source via JAX autodiff through the linear FE
  solve (hybrid implicit-function-theorem adjoint).
build_config:
  target_platform: "native"
  base_image: "condaforge/miniforge3:24.11.3-0"
  requirements:
    provider: conda
  package_data:
    - ["../../../mosaic_shared", "/tmp/mosaic_shared"]
  custom_build_steps:
    - "RUN /python-env/bin/pip install /tmp/mosaic_shared"

metadata:
  mosaic:
    name: "JAX-FEM"
    backend: jax
    family: fem
    scheme: "FEM HEX8 heat conduction (SIMP, adjoint AD)"
    discretization: FE
    numerics: "Direct (UMFPACK)"
    ad_strategy: hybrid
    differentiable: true
    uses_gpu: true
    internal_dtype: float32
    doc_url: "https://github.com/deepmodeling/jax-fem"
