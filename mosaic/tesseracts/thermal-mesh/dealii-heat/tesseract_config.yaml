name: dealii_heat_thermal_mesh
version: "0.1.0"
description: >
  deal.II Q1 trilinear hexahedral FEM heat-conduction solver with SIMP conductivity (C++
  subprocess, UMFPACK direct). Forward-only — reference implementation for cross-framework
  validation.
build_config:
  # NOTE: the upstream `dealii/dealii:latest` image defaults to USER `dealii`,
  # so the tesseract template's hardcoded apt-get steps (in both build_stage
  # and run_stage) fail with EACCES on /var/lib/apt/lists/partial. We use a
  # locally-built wrapper image that just sets USER root. The wrapper is
  # built by `mosaic/tesseracts/thermal-mesh/dealii-heat/build_base.sh`
  # (idempotent, ~1s if dealii/dealii:latest is already pulled).
  base_image: "dealii-root:latest"
  extra_packages:
    - nlohmann-json3-dev
  package_data:
    - ["../../../mosaic_shared", "/tmp/mosaic_shared"]
    - ["./src", "/opt/dealii_heat/src"]
    - ["./CMakeLists.txt", "/opt/dealii_heat/CMakeLists.txt"]
  custom_build_steps:
    - "RUN pip install /tmp/mosaic_shared"
    - "RUN cd /opt/dealii_heat && cmake -B build -DCMAKE_BUILD_TYPE=Release . && cmake --build build -j4"

metadata:
  mosaic:
    name: "deal.II"
    backend: cpp
    family: fem
    scheme: "FEM Q1 heat conduction (SIMP, forward-only)"
    discretization: FE
    numerics: "Direct (spsolve)"
    ad_strategy: null
    differentiable: false
    uses_gpu: false
    internal_dtype: float64
    doc_url: "https://www.dealii.org/"
