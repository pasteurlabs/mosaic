name: fenics_heat_thermal_mesh
version: "0.1.0"
description: >
  FEniCS P1 FEM heat-conduction solver with SIMP penalisation. Gradients (∂C/∂ρ, ∂C/∂source)
  via dolfin-adjoint tape replay.
build_config:
  base_image: "condaforge/miniforge3:24.11.2-0"
  requirements:
    provider: conda
  package_data:
    - ["../../../mosaic_shared", "/tmp/mosaic_shared"]
  custom_build_steps:
    - "RUN /python-env/bin/pip install /tmp/mosaic_shared"

metadata:
  mosaic:
    name: "FEniCS"
    backend: fenics
    family: fem
    scheme: "FEM P1 heat conduction (SIMP, dolfin-adjoint)"
    discretization: FE
    numerics: "GMRES+AMG"
    ad_strategy: adjoint
    differentiable: true
    uses_gpu: false
    internal_dtype: float64
    doc_url: "https://fenicsproject.org/"
